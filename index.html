<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>해바람 입고 정산 MVP</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #5d6b78;
      --line: #d8ddd3;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --accent: #b45309;
      --danger: #b91c1c;
      --ok: #166534;
      --warning: #92400e;
      --blue: #1d4ed8;
      --shadow: 0 12px 28px rgba(18, 32, 43, 0.10);
      --radius: 8px;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 18px;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(18, 32, 43, 0.07);
    }

    .topbar-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 14px 16px 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand strong {
      font-size: 22px;
    }

    .brand span {
      color: var(--muted);
      font-size: 14px;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .nav button,
    .quick-button,
    .primary-button,
    .secondary-button,
    .ghost-button,
    .danger-button,
    .option-card,
    .qty-button {
      border: 0;
      border-radius: var(--radius);
      min-height: 48px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .nav button {
      background: #edf1ed;
      color: #25323a;
      padding: 12px 8px;
      font-weight: 700;
    }

    .nav button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 7px 18px rgba(15, 118, 110, 0.22);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px 16px 36px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 16px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 28px;
    }

    h2 {
      font-size: 24px;
    }

    h3 {
      font-size: 20px;
    }

    .muted {
      color: var(--muted);
      font-size: 15px;
    }

    .home-actions {
      display: grid;
      gap: 12px;
    }

    .quick-button {
      width: 100%;
      min-height: 82px;
      padding: 16px;
      background: var(--surface);
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }

    .quick-button strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .quick-button .count {
      min-width: 52px;
      min-height: 52px;
      border-radius: 50%;
      background: #fff3d6;
      color: var(--warning);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 22px rgba(18, 32, 43, 0.07);
      margin-bottom: 14px;
    }

    .stats-grid,
    .master-grid {
      display: grid;
      gap: 12px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat .label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .stat .value {
      font-size: 30px;
      font-weight: 900;
    }

    .stat.primary {
      border-left: 7px solid var(--primary);
    }

    .stat.accent {
      border-left: 7px solid var(--accent);
    }

    .stat.blue {
      border-left: 7px solid var(--blue);
    }

    .wizard-layout {
      display: grid;
      gap: 14px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 14px;
    }

    .step {
      min-height: 44px;
      border-radius: var(--radius);
      background: #e9eee8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #3a4a54;
      text-align: center;
      padding: 6px;
    }

    .step.active {
      background: var(--primary);
      color: #fff;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      min-height: 54px;
      border-radius: var(--radius);
      border: 2px solid var(--line);
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(15, 118, 110, 0.18);
      border-color: var(--primary);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option-card {
      width: 100%;
      min-height: 78px;
      padding: 12px;
      background: #fff;
      border: 2px solid var(--line);
      text-align: left;
      color: var(--ink);
    }

    .option-card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .option-card.selected {
      border-color: var(--primary);
      background: #e9f6f4;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.16);
    }

    .recent-strip {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 2px 0 10px;
    }

    .recent-strip button {
      flex: 0 0 auto;
      min-height: 50px;
      border-radius: var(--radius);
      border: 1px solid #cfdbd6;
      background: #eff7f4;
      padding: 9px 12px;
      font-weight: 800;
      color: #153c39;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .primary-button,
    .secondary-button,
    .ghost-button,
    .danger-button {
      min-height: 54px;
      padding: 12px 16px;
      font-weight: 900;
    }

    .primary-button {
      background: var(--primary);
      color: #fff;
    }

    .secondary-button {
      background: #25323a;
      color: #fff;
    }

    .ghost-button {
      background: #edf1ed;
      color: #263238;
      border: 1px solid var(--line);
    }

    .danger-button {
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .primary-button:disabled,
    .secondary-button:disabled,
    .ghost-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .qty-control {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .qty-button {
      min-height: 58px;
      background: #fff7ed;
      color: #7c2d12;
      border: 2px solid #fed7aa;
      font-weight: 900;
    }

    .money-box {
      display: grid;
      gap: 8px;
      background: #f7fbf8;
      border: 1px solid #cfe3d8;
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 12px;
    }

    .money-box b {
      font-size: 26px;
    }

    .line-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .line-item,
    .settlement-row,
    .receipt-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .line-item .top,
    .settlement-row .top,
    .receipt-card .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7eef8;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.waiting {
      background: #fff7ed;
      color: #9a3412;
    }

    .badge.done {
      background: #eaf7ed;
      color: var(--ok);
    }

    .badge.pending-price {
      background: #fee2e2;
      color: var(--danger);
    }

    .receipt-details {
      display: none;
      margin-top: 10px;
    }

    .receipt-card.open .receipt-details {
      display: block;
    }

    .post-save-actions {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .price-editor {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: var(--radius);
      background: #fff7ed;
    }

    .price-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 860px;
      font-size: 16px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #edf1ed;
      font-size: 14px;
      color: #34444d;
    }

    td select {
      min-height: 42px;
      padding: 6px;
      border-width: 1px;
      font-size: 15px;
    }

    .empty {
      padding: 20px;
      border: 1px dashed #b9c4bd;
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      text-align: center;
    }

    .summary-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #edf1ed;
      padding: 8px 0;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      background: #17202a;
      color: #fff;
      padding: 14px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: none;
      font-weight: 800;
    }

    .toast.show {
      display: block;
    }

    @media (min-width: 760px) {
      body {
        font-size: 17px;
      }

      .home-actions,
      .stats-grid,
      .master-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .wizard-layout {
        grid-template-columns: 1.4fr 0.8fr;
        align-items: start;
      }

      .option-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 1020px) {
      .stats-grid,
      .master-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .home-actions {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .quick-button {
        min-height: 132px;
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand">
            <strong>해바람 농가 입고</strong>
            <span id="todayLabel">현장 입력 · 정산 집계 프로토타입</span>
          </div>
          <button class="ghost-button" type="button" onclick="seedReset()">샘플 초기화</button>
        </div>
        <nav class="nav" aria-label="주요 화면">
          <button type="button" data-nav="home" class="active" onclick="showScreen('home')">홈</button>
          <button type="button" data-nav="today" onclick="showScreen('today')">오늘</button>
          <button type="button" data-nav="admin" onclick="showScreen('admin')">관리</button>
          <button type="button" data-nav="settlement" onclick="showScreen('settlement')">정산</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="screen-home" class="screen active"></section>
      <section id="screen-wizard" class="screen"></section>
      <section id="screen-today" class="screen"></section>
      <section id="screen-admin" class="screen"></section>
      <section id="screen-settlement" class="screen"></section>
      <section id="screen-afterSave" class="screen"></section>
      <section id="screen-master" class="screen"></section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "haebaramReceivingAppV1";
    const STATUS = ["입력필요", "정산대기", "사무확인", "정산확정", "입금대기", "입금완료"];
    const STEPS = ["농가", "영수증", "품목", "등급", "용기", "수량", "확인"];

    const MASTER = {
      farmers: [
        { id: "F001", name: "김해숙 농가", phone: "010-3412-7788", bankName: "농협", accountNo: "351-0123-4567-89", accountHolder: "김해숙", memo: "오전 선호" },
        { id: "F002", name: "박문호 농가", phone: "010-8890-1204", bankName: "농협", accountNo: "301-7700-2244-11", accountHolder: "박문호", memo: "배 주력" },
        { id: "F003", name: "이정자 농가", phone: "010-4400-9361", bankName: "농협", accountNo: "352-6600-1000-45", accountHolder: "이정자", memo: "전화 확인 필요" },
        { id: "F004", name: "최성민 농가", phone: "010-7102-4455", bankName: "신협", accountNo: "131-019-004455", accountHolder: "최성민", memo: "복숭아" },
        { id: "F005", name: "윤미경 농가", phone: "010-5530-8877", bankName: "농협", accountNo: "356-1122-9000-77", accountHolder: "윤미경", memo: "포도 당일 정산 요청" },
        { id: "F006", name: "정도윤 농가", phone: "010-9900-6123", bankName: "국민", accountNo: "777701-04-292929", accountHolder: "정도윤", memo: "감귤 소량" }
      ],
      items: ["사과", "배", "복숭아", "포도", "감귤"],
      grades: ["특", "상", "보통", "가공"],
      containers: [
        { type: "박스", size: "5kg" },
        { type: "박스", size: "10kg" },
        { type: "박스", size: "15kg" },
        { type: "통", size: "12입" },
        { type: "망", size: "20kg" }
      ],
      priceRules: [
        ["사과", "특", "5kg", 36000], ["사과", "상", "5kg", 30000], ["사과", "보통", "5kg", 22000], ["사과", "가공", "5kg", 12000],
        ["사과", "특", "10kg", 68000], ["사과", "상", "10kg", 56000], ["사과", "보통", "10kg", 41000], ["사과", "가공", "10kg", 23000],
        ["배", "특", "15kg", 72000], ["배", "상", "15kg", 62000], ["배", "보통", "15kg", 48000], ["배", "가공", "15kg", 26000],
        ["복숭아", "특", "5kg", 42000], ["복숭아", "상", "5kg", 35000], ["복숭아", "보통", "5kg", 26000], ["복숭아", "가공", "5kg", 15000],
        ["포도", "특", "5kg", 52000], ["포도", "상", "5kg", 43000], ["포도", "보통", "5kg", 32000], ["포도", "가공", "5kg", 18000],
        ["감귤", "특", "10kg", 34000], ["감귤", "상", "10kg", 28000], ["감귤", "보통", "10kg", 21000], ["감귤", "가공", "10kg", 11000],
        ["사과", "상", "12입", 26000], ["배", "상", "12입", 30000], ["포도", "상", "12입", 38000], ["감귤", "상", "20kg", 52000]
      ].map(([item, grade, containerSize, unitPrice]) => ({ item, grade, containerSize, unitPrice }))
    };

    let db = loadDb();
    let currentScreen = "home";
    let farmerQuery = "";
    let wizard = freshWizard();
    let lastAddedLine = null;
    let afterSaveFarmerId = "";

    function localDateISO(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function nowLocal() {
      const date = new Date();
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${localDateISO(date)}T${hour}:${minute}`;
    }

    function makeId(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
    }

    function money(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function amountLabel(line) {
      return isPricePending(line) ? "단가 미정 / 정산 확인 필요" : money(line.amount);
    }

    function priceLabel(line) {
      return isPricePending(line) ? "단가 미정" : money(line.unitPrice);
    }

    function isPricePending(line) {
      return line?.pricePending || line?.unitPrice === null || line?.amount === null;
    }

    function payableAmount(line) {
      return isPricePending(line) ? 0 : Number(line.amount || 0);
    }

    function priceRuleKey(rule) {
      return `${rule.item}||${rule.grade}||${rule.containerSize}`;
    }

    function normalizePriceRule(rule) {
      return {
        item: String(rule.item || "").trim(),
        grade: String(rule.grade || "").trim(),
        containerSize: String(rule.containerSize || "").trim(),
        unitPrice: Math.max(0, Number(rule.unitPrice || 0))
      };
    }

    function number(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function loadDb() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          return {
            farmers: parsed.farmers || MASTER.farmers,
            items: parsed.items || MASTER.items,
            grades: parsed.grades || MASTER.grades,
            containers: parsed.containers || MASTER.containers,
            priceRules: parsed.priceRules || MASTER.priceRules,
            receipts: parsed.receipts || [],
            lines: parsed.lines || [],
            settlementStatuses: parsed.settlementStatuses || {}
          };
        } catch (error) {
          console.warn("localStorage parse failed", error);
        }
      }
      return createSeedDb();
    }

    function createSeedDb() {
      const today = localDateISO();
      const yesterdayDate = new Date();
      yesterdayDate.setDate(yesterdayDate.getDate() - 1);
      const yesterday = localDateISO(yesterdayDate);
      const receipts = [
        { id: "R001", receiptNo: "A-1001", receivedAt: `${today}T08:35`, farmerId: "F001", status: "사무확인", photoName: "receipt_A-1001.jpg", createdAt: `${today}T08:35`, updatedAt: `${today}T08:35` },
        { id: "R002", receiptNo: "A-1002", receivedAt: `${today}T09:20`, farmerId: "F002", status: "정산대기", photoName: "", createdAt: `${today}T09:20`, updatedAt: `${today}T09:20` },
        { id: "R003", receiptNo: "B-0998", receivedAt: `${yesterday}T15:10`, farmerId: "F005", status: "입금대기", photoName: "receipt_B-0998.jpg", createdAt: `${yesterday}T15:10`, updatedAt: `${yesterday}T15:10` }
      ];
      const lines = [
        { id: "L001", receiptId: "R001", item: "사과", grade: "상", containerType: "박스", containerSize: "10kg", count: 12, unitPrice: 56000, amount: 672000 },
        { id: "L002", receiptId: "R001", item: "사과", grade: "보통", containerType: "박스", containerSize: "10kg", count: 5, unitPrice: 41000, amount: 205000 },
        { id: "L003", receiptId: "R002", item: "배", grade: "특", containerType: "박스", containerSize: "15kg", count: 8, unitPrice: 72000, amount: 576000 },
        { id: "L004", receiptId: "R003", item: "포도", grade: "상", containerType: "박스", containerSize: "5kg", count: 10, unitPrice: 43000, amount: 430000 }
      ];
      return {
        farmers: MASTER.farmers,
        items: MASTER.items,
        grades: MASTER.grades,
        containers: MASTER.containers,
        priceRules: MASTER.priceRules,
        receipts,
        lines,
        settlementStatuses: { F005: "입금대기" }
      };
    }

    function saveDb() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function seedReset() {
      if (!confirm("샘플 데이터를 초기화할까요? 현재 브라우저 저장 데이터가 바뀝니다.")) return;
      db = createSeedDb();
      saveDb();
      wizard = freshWizard();
      renderAll();
      toast("샘플 데이터가 초기화되었습니다.");
    }

    function freshWizard() {
      const seq = String((db?.receipts?.length || 0) + 1).padStart(3, "0");
      return {
        step: 0,
        editingId: null,
        farmerId: "",
        receiptNo: `R-${localDateISO().replaceAll("-", "")}-${seq}`,
        photoName: "",
        lines: [],
        line: { item: "", grade: "", containerType: "", containerSize: "", count: 1, unitPrice: null, pricePending: false }
      };
    }

    function renderAll() {
      document.getElementById("todayLabel").textContent = `${localDateISO()} · 브라우저 저장 프로토타입`;
      renderHome();
      renderToday();
      renderAdmin();
      renderSettlement();
      renderMaster();
      renderAfterSave();
      if (currentScreen === "wizard") renderWizard();
      setActiveNav();
    }

    function showScreen(name) {
      currentScreen = name;
      document.querySelectorAll(".screen").forEach((node) => node.classList.remove("active"));
      document.getElementById(`screen-${name}`).classList.add("active");
      if (name === "wizard") renderWizard();
      setActiveNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setActiveNav() {
      document.querySelectorAll("[data-nav]").forEach((button) => {
        const nav = button.dataset.nav;
        button.classList.toggle("active", nav === currentScreen);
      });
    }

    function startNewReceipt(farmerId = "") {
      wizard = freshWizard();
      wizard.farmerId = farmerId;
      wizard.step = farmerId ? 1 : 0;
      farmerQuery = "";
      showScreen("wizard");
    }

    function startPhotoOnlyReceipt() {
      wizard = freshWizard();
      wizard.receiptNo = `PHOTO-${localDateISO().replaceAll("-", "")}-${String(db.receipts.length + 1).padStart(3, "0")}`;
      wizard.step = 1;
      showScreen("wizard");
    }

    function todayReceipts() {
      const today = localDateISO();
      return db.receipts.filter((receipt) => receipt.receivedAt.slice(0, 10) === today);
    }

    function receiptTotal(receiptId) {
      return db.lines
        .filter((line) => line.receiptId === receiptId)
        .reduce((sum, line) => sum + payableAmount(line), 0);
    }

    function getFarmer(id) {
      return db.farmers.find((farmer) => farmer.id === id);
    }

    function renderHome() {
      const todays = todayReceipts();
      const unchecked = db.receipts.filter((receipt) => receipt.status === "정산대기").length;
      const photoMissing = db.receipts.filter((receipt) => !receipt.photoName).length;
      document.getElementById("screen-home").innerHTML = `
        <div class="section-head">
          <div>
            <h1>현장용 홈</h1>
            <p class="muted">자주 쓰는 작업만 크게 배치했습니다.</p>
          </div>
        </div>
        <div class="home-actions">
          <button class="quick-button" type="button" onclick="startNewReceipt()">
            <span><strong>입고 등록</strong><span class="muted">농가, 품목, 수량 입력</span></span>
            <span class="count">+</span>
          </button>
          <button class="quick-button" type="button" onclick="startPhotoOnlyReceipt()">
            <span><strong>사진만 먼저 찍기</strong><span class="muted">나중에 입력할 영수증 생성</span></span>
            <span class="count">${photoMissing}</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('today')">
            <span><strong>오늘 입고 현황</strong><span class="muted">영수증과 상세 줄 확인</span></span>
            <span class="count">${todays.length}</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('today')">
            <span><strong>미확인 입고</strong><span class="muted">정산대기 상태</span></span>
            <span class="count">${unchecked}</span>
          </button>
        </div>
        <div class="panel" style="margin-top: 16px;">
          <h2>빠른 요약</h2>
          <ul class="summary-list">
            <li><span>오늘 입고 금액</span><b>${money(todays.reduce((sum, receipt) => sum + receiptTotal(receipt.id), 0))}</b></li>
            <li><span>오늘 입고 농가</span><b>${new Set(todays.map((receipt) => receipt.farmerId)).size}곳</b></li>
            <li><span>입금대기 농가</span><b>${computeSettlements().filter((row) => row.status === "입금대기").length}곳</b></li>
          </ul>
        </div>
      `;
    }

    function renderWizard() {
      const farmer = getFarmer(wizard.farmerId);
      document.getElementById("screen-wizard").innerHTML = `
        <div class="section-head">
          <div>
            <h1>${wizard.editingId ? "입고 수정" : "입고 등록"}</h1>
            <p class="muted">한 영수증에 여러 상세 줄을 추가할 수 있습니다.</p>
          </div>
          <button class="ghost-button" type="button" onclick="showScreen('home')">홈으로</button>
        </div>
        <div class="steps">${STEPS.map((label, index) => `<div class="step ${index === wizard.step ? "active" : ""}">${index + 1}. ${label}</div>`).join("")}</div>
        <div class="wizard-layout">
          <div class="panel">
            ${renderWizardStep()}
            <div class="button-row">
              <button class="ghost-button" type="button" onclick="wizardBack()" ${wizard.step === 0 ? "disabled" : ""}>이전</button>
              <button class="secondary-button" type="button" onclick="wizardNext()" ${canMoveNext() ? "" : "disabled"}>다음</button>
              <button class="primary-button" type="button" onclick="saveReceipt()" ${wizard.lines.length ? "" : "disabled"}>${wizard.editingId ? "수정 저장" : "영수증 저장"}</button>
            </div>
          </div>
          <aside class="panel">
            <h2>입력 요약</h2>
            <ul class="summary-list">
              <li><span>농가</span><b>${farmer ? escapeHtml(farmer.name) : "미선택"}</b></li>
              <li><span>영수증 NO</span><b>${escapeHtml(wizard.receiptNo)}</b></li>
              <li><span>사진</span><b>${wizard.photoName ? escapeHtml(wizard.photoName) : "Mock 미첨부"}</b></li>
              <li><span>상세 줄</span><b>${wizard.lines.length}줄</b></li>
              <li><span>정산 합계</span><b>${money(wizard.lines.reduce((sum, line) => sum + payableAmount(line), 0))}</b></li>
              <li><span>단가 미정</span><b>${wizard.lines.filter(isPricePending).length}줄</b></li>
            </ul>
            ${renderWizardLines()}
          </aside>
        </div>
      `;
      if (wizard.step === 0) {
        const input = document.getElementById("farmerSearch");
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
    }

    function renderWizardStep() {
      if (wizard.step === 0) return renderFarmerStep();
      if (wizard.step === 1) return renderReceiptStep();
      if (wizard.step === 2) return renderItemStep();
      if (wizard.step === 3) return renderGradeStep();
      if (wizard.step === 4) return renderContainerStep();
      if (wizard.step === 5) return renderCountStep();
      return renderConfirmStep();
    }

    function renderFarmerStep() {
      const recent = recentFarmers();
      const query = farmerQuery.trim().toLowerCase();
      const farmers = db.farmers.filter((farmer) => {
        const last4 = farmer.phone.replace(/\D/g, "").slice(-4);
        return !query || farmer.name.toLowerCase().includes(query) || last4.includes(query);
      });
      return `
        <h2>농가 선택</h2>
        <p class="muted">이름 또는 전화번호 뒤 4자리로 찾을 수 있습니다.</p>
        <div class="field">
          <label for="farmerSearch">농가 검색</label>
          <input id="farmerSearch" value="${escapeHtml(farmerQuery)}" oninput="farmerQuery = this.value; renderWizard();" placeholder="예: 김해숙 또는 7788">
        </div>
        <h3>최근 농가</h3>
        <div class="recent-strip">
          ${recent.map((farmer) => `<button type="button" onclick="selectFarmer('${farmer.id}')">${escapeHtml(farmer.name)} · ${escapeHtml(farmer.phone.slice(-4))}</button>`).join("") || "<span class='muted'>최근 기록 없음</span>"}
        </div>
        <div class="option-grid">
          ${farmers.map((farmer) => `
            <button class="option-card ${wizard.farmerId === farmer.id ? "selected" : ""}" type="button" onclick="selectFarmer('${farmer.id}')">
              <strong>${escapeHtml(farmer.name)}</strong>
              <span>${escapeHtml(farmer.phone)} · ${escapeHtml(farmer.bankName)}</span>
            </button>
          `).join("") || "<div class='empty'>검색 결과가 없습니다.</div>"}
        </div>
      `;
    }

    function recentFarmers() {
      const ordered = [...db.receipts]
        .sort((a, b) => b.receivedAt.localeCompare(a.receivedAt))
        .map((receipt) => receipt.farmerId);
      return [...new Set(ordered)].slice(0, 4).map(getFarmer).filter(Boolean);
    }

    function selectFarmer(id) {
      wizard.farmerId = id;
      farmerQuery = "";
      wizard.step = Math.max(wizard.step, 1);
      renderWizard();
    }

    function renderReceiptStep() {
      return `
        <h2>영수증 정보</h2>
        <div class="field">
          <label for="receiptNo">영수증 NO</label>
          <input id="receiptNo" value="${escapeHtml(wizard.receiptNo)}" oninput="wizard.receiptNo = this.value.trim();" placeholder="영수증 번호">
        </div>
        <div class="field">
          <label for="photoMock">영수증 사진 첨부 Mock</label>
          <input id="photoMock" type="file" accept="image/*" onchange="wizard.photoName = this.files[0] ? this.files[0].name : ''; renderWizard();">
          <span class="muted">브라우저 프로토타입이므로 파일명만 저장합니다. 실제 업로드는 백엔드 단계에서 연결합니다.</span>
        </div>
        <div class="button-row">
          <button class="secondary-button" type="button" onclick="savePhotoOnlyReceipt()" ${wizard.photoName ? "" : "disabled"}>사진만 저장하고 나중에 입력</button>
        </div>
        ${wizard.photoName ? `<div class="badge done">첨부 파일명: ${escapeHtml(wizard.photoName)}</div>` : `<div class="badge waiting">사진 미첨부</div>`}
      `;
    }

    function renderItemStep() {
      return `
        <h2>품목 선택</h2>
        <div class="option-grid">
          ${db.items.map((item) => `
            <button class="option-card ${wizard.line.item === item ? "selected" : ""}" type="button" onclick="selectLineValue('item', '${item}', 3)">
              <strong>${escapeHtml(item)}</strong>
              <span>카드 선택</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderGradeStep() {
      return `
        <h2>등급 선택</h2>
        <div class="option-grid">
          ${db.grades.map((grade) => `
            <button class="option-card ${wizard.line.grade === grade ? "selected" : ""}" type="button" onclick="selectLineValue('grade', '${grade}', 4)">
              <strong>${escapeHtml(grade)}</strong>
              <span>${grade === "가공" ? "가공용" : "입고 등급"}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderContainerStep() {
      return `
        <h2>용기/사이즈 선택</h2>
        <div class="option-grid">
          ${db.containers.map((container) => {
            const selected = wizard.line.containerType === container.type && wizard.line.containerSize === container.size;
            return `
              <button class="option-card ${selected ? "selected" : ""}" type="button" onclick="selectContainer('${container.type}', '${container.size}')">
                <strong>${escapeHtml(container.type)} ${escapeHtml(container.size)}</strong>
                <span>단가표 기준</span>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function selectLineValue(key, value, nextStep) {
      wizard.line[key] = value;
      wizard.step = nextStep;
      syncUnitPrice();
      renderWizard();
    }

    function selectContainer(type, size) {
      wizard.line.containerType = type;
      wizard.line.containerSize = size;
      wizard.step = 5;
      syncUnitPrice();
      renderWizard();
    }

    function syncUnitPrice() {
      const price = findPrice(wizard.line.item, wizard.line.grade, wizard.line.containerSize);
      wizard.line.pricePending = !price;
      wizard.line.unitPrice = price || null;
    }

    function findPrice(item, grade, containerSize) {
      const rule = db.priceRules.find((priceRule) => priceRule.item === item && priceRule.grade === grade && priceRule.containerSize === containerSize);
      return rule ? Number(rule.unitPrice) : 0;
    }

    function applyPriceToLine(line, unitPrice) {
      line.unitPrice = unitPrice;
      line.amount = Number(line.count || 0) * unitPrice;
      line.pricePending = false;
    }

    function upsertPriceRuleFromLine(line, unitPrice) {
      upsertPriceRule({
        item: line.item,
        grade: line.grade,
        containerSize: line.containerSize,
        unitPrice
      });
    }

    function upsertPriceRule(rule, skipSave = false) {
      const normalized = normalizePriceRule(rule);
      if (!normalized.item || !normalized.grade || !normalized.containerSize || !normalized.unitPrice) {
        toast("품목, 등급, 사이즈, 단가를 확인하세요.");
        return false;
      }
      const key = priceRuleKey(normalized);
      const existing = db.priceRules.find((priceRule) => priceRuleKey(priceRule) === key);
      if (existing) {
        existing.unitPrice = normalized.unitPrice;
      } else {
        db.priceRules.push(normalized);
      }
      db.priceRules.sort((a, b) => `${a.item}${a.grade}${a.containerSize}`.localeCompare(`${b.item}${b.grade}${b.containerSize}`, "ko-KR"));
      if (!skipSave) saveDb();
      return true;
    }

    function renderCountStep() {
      syncUnitPrice();
      const count = Number(wizard.line.count || 0);
      const unitPrice = Number(wizard.line.unitPrice || 0);
      const amount = wizard.line.pricePending ? null : count * unitPrice;
      return `
        <h2>수량과 금액 확인</h2>
        <div class="panel" style="box-shadow:none;">
          <b>${escapeHtml(wizard.line.item)} · ${escapeHtml(wizard.line.grade)} · ${escapeHtml(wizard.line.containerType)} ${escapeHtml(wizard.line.containerSize)}</b>
        </div>
        <label>개수 조정</label>
        <div class="qty-control">
          <button class="qty-button" type="button" onclick="changeCount(-50)">-50</button>
          <button class="qty-button" type="button" onclick="changeCount(-10)">-10</button>
          <button class="qty-button" type="button" onclick="changeCount(-5)">-5</button>
          <button class="qty-button" type="button" onclick="changeCount(-1)">-1</button>
          <button class="qty-button" type="button" onclick="changeCount(1)">+1</button>
          <button class="qty-button" type="button" onclick="changeCount(5)">+5</button>
          <button class="qty-button" type="button" onclick="changeCount(10)">+10</button>
          <button class="qty-button" type="button" onclick="changeCount(50)">+50</button>
        </div>
        <label>빠른 수량</label>
        <div class="qty-control">
          ${[1, 5, 10, 20, 30, 50].map((value) => `<button class="qty-button" type="button" onclick="setCount(${value})">${value}</button>`).join("")}
        </div>
        <div class="field">
          <input type="number" min="0" value="${count}" oninput="wizard.line.count = Math.max(0, Number(this.value || 0)); renderWizard();" aria-label="개수 직접 입력">
        </div>
        ${wizard.line.pricePending ? `
          <div class="money-box">
            <span class="badge pending-price">단가 미정 / 정산 확인 필요</span>
            <span class="muted">단가표에 없는 조합입니다. 상세 줄은 저장되지만 정산/입금대상 합계에서는 제외됩니다.</span>
          </div>
        ` : `
          <div class="field">
            <label for="unitPrice">단가 확인</label>
            <input id="unitPrice" type="number" min="0" value="${unitPrice}" oninput="wizard.line.unitPrice = Math.max(0, Number(this.value || 0)); wizard.line.pricePending = false; renderWizard();">
          </div>
        `}
        <div class="money-box">
          <span class="muted">정산 반영 금액</span>
          <b>${amount === null ? "단가 미정 / 정산 확인 필요" : money(amount)}</b>
        </div>
        <div class="button-row">
          <button class="primary-button" type="button" onclick="addLine()" ${canAddLine() ? "" : "disabled"}>상세 줄 추가</button>
          <button class="secondary-button" type="button" onclick="copyLastLine()" ${lastAddedLine ? "" : "disabled"}>방금 줄 복사</button>
          <button class="ghost-button" type="button" onclick="clearLine()">현재 줄 초기화</button>
        </div>
      `;
    }

    function changeCount(delta) {
      wizard.line.count = Math.max(0, Number(wizard.line.count || 0) + delta);
      renderWizard();
    }

    function setCount(value) {
      wizard.line.count = Math.max(0, Number(value || 0));
      renderWizard();
    }

    function canAddLine() {
      return wizard.line.item && wizard.line.grade && wizard.line.containerType && wizard.line.containerSize && Number(wizard.line.count) > 0;
    }

    function addLine() {
      if (!canAddLine()) {
        toast("품목, 등급, 용기, 수량을 확인하세요.");
        return;
      }
      const count = Number(wizard.line.count);
      const unitPrice = wizard.line.pricePending ? null : Number(wizard.line.unitPrice);
      const line = {
        id: makeId("line"),
        item: wizard.line.item,
        grade: wizard.line.grade,
        containerType: wizard.line.containerType,
        containerSize: wizard.line.containerSize,
        count,
        unitPrice,
        amount: wizard.line.pricePending ? null : count * unitPrice,
        pricePending: Boolean(wizard.line.pricePending)
      };
      wizard.lines.push(line);
      lastAddedLine = { ...line, id: makeId("lineCopy") };
      clearLine(false);
      wizard.step = 6;
      renderWizard();
      toast("상세 줄이 추가되었습니다.");
    }

    function clearLine(render = true) {
      wizard.line = { item: "", grade: "", containerType: "", containerSize: "", count: 1, unitPrice: null, pricePending: false };
      if (render) renderWizard();
    }

    function copyLastLine() {
      if (!lastAddedLine) return;
      wizard.lines.push({ ...lastAddedLine, id: makeId("line") });
      toast("방금 줄을 복사했습니다.");
      renderWizard();
    }

    function renderConfirmStep() {
      return `
        <h2>저장 전 확인</h2>
        ${wizard.lines.length ? renderWizardLines(true) : "<div class='empty'>아직 추가된 상세 줄이 없습니다.</div>"}
        <div class="button-row">
          <button class="secondary-button" type="button" onclick="wizard.step = 2; renderWizard();">상세 줄 더 추가</button>
          <button class="ghost-button" type="button" onclick="copyLastLine()" ${lastAddedLine ? "" : "disabled"}>방금 줄 복사</button>
        </div>
      `;
    }

    function renderWizardLines(includeRemove = false) {
      if (!wizard.lines.length) return "<div class='empty'>상세 줄을 추가하면 여기에 표시됩니다.</div>";
      return `
        <div class="line-list">
          ${wizard.lines.map((line, index) => `
            <div class="line-item">
              <div class="top">
                <b>${index + 1}. ${escapeHtml(line.item)} ${escapeHtml(line.grade)}</b>
                <span class="badge ${isPricePending(line) ? "pending-price" : ""}">${amountLabel(line)}</span>
              </div>
              <div class="muted">${escapeHtml(line.containerType)} ${escapeHtml(line.containerSize)} · ${number(line.count)}개 · 단가 ${priceLabel(line)}</div>
              ${isPricePending(line) ? renderWizardLinePriceEditor(line) : ""}
              ${includeRemove ? `<button class="danger-button" type="button" onclick="removeWizardLine('${line.id}')">이 줄 삭제</button>` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function removeWizardLine(lineId) {
      wizard.lines = wizard.lines.filter((line) => line.id !== lineId);
      renderWizard();
    }

    function renderWizardLinePriceEditor(line) {
      return `
        <div class="price-editor">
          <label for="wizard-price-${line.id}">단가 입력</label>
          <input id="wizard-price-${line.id}" type="number" min="1" placeholder="단가" aria-label="단가 입력">
          <div class="button-row">
            <button class="primary-button" type="button" onclick="applyWizardLinePrice('${line.id}', false)">이 줄만 반영</button>

    function canMoveNext() {
      if (wizard.step === 0) return Boolean(wizard.farmerId);
      if (wizard.step === 1) return Boolean(wizard.receiptNo.trim());
      if (wizard.step === 2) return Boolean(wizard.line.item);
      if (wizard.step === 3) return Boolean(wizard.line.grade);
      if (wizard.step === 4) return Boolean(wizard.line.containerSize);
      if (wizard.step === 5) return canAddLine();
      return false;
    }

    function wizardNext() {
      if (wizard.step === 5) {
        addLine();
        return;
      }
      if (wizard.step < STEPS.length - 1 && canMoveNext()) {
        wizard.step += 1;
        renderWizard();
      }

      wizard.step = Math.max(0, wizard.step - 1);

    function computeSettlements() {
      const rows = new Map();
      db.receipts.forEach((receipt) => {
        if (!receipt.farmerId) return;
        const receiptLines = db.lines.filter((line) => line.receiptId === receipt.id);
        const total = receiptTotal(receipt.id);
        if (!rows.has(receipt.farmerId)) {
          rows.set(receipt.farmerId, { farmerId: receipt.farmerId, totalAmount: 0, receiptCount: 0, pendingPriceCount: 0, status: db.settlementStatuses[receipt.farmerId] || "정산대기" });
        }
        const row = rows.get(receipt.farmerId);
        row.totalAmount += total;
        row.receiptCount += 1;
        row.pendingPriceCount += receiptLines.filter(isPricePending).length;
      });
      return [...rows.values()].sort((a, b) => b.totalAmount - a.totalAmount);
    }

    function downloadPaymentCsv(isMockTransfer) {
      const targetRows = computeSettlements().filter((row) => row.status === "입금대기" && row.totalAmount > 0);
      if (!targetRows.length) {
        toast("입금대기 상태이면서 지급액이 있는 농가가 없습니다.");
        return;
      }
      const header = ["은행명", "계좌번호", "예금주", "지급액", "농가명", "메모"];
      const lines = targetRows.map((row) => {
        const farmer = getFarmer(row.farmerId);
        const memo = isMockTransfer ? `MOCK 이체파일 검토용 - ${farmer?.memo || ""}` : farmer?.memo || "";
        return [farmer?.bankName, farmer?.accountNo, farmer?.accountHolder, row.totalAmount, farmer?.name, memo].map(csvEscape).join(",");
      });
      const blob = new Blob(["\ufeff" + [header.join(","), ...lines].join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = isMockTransfer ? `payment-transfer-mock-${localDateISO()}.csv` : `payment-targets-${localDateISO()}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast(isMockTransfer ? "Mock 이체파일 CSV가 생성되었습니다." : "입금대상 CSV가 생성되었습니다.");
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    }

    function optionList(values, selected) {
      return values.map((value) => `<option value="${escapeHtml(value)}" ${value === selected ? "selected" : ""}>${escapeHtml(value)}</option>`).join("");
    }

    function renderPriceRuleCreateForm() {
      return `
        <div class="price-editor">
          <h3>새 단가 추가</h3>
          <div class="price-grid">
            <label>품목<select id="newRuleItem">${optionList(db.items, db.items[0])}</select></label>
            <label>등급<select id="newRuleGrade">${optionList(db.grades, db.grades[0])}</select></label>
            <label>용기/사이즈<select id="newRuleSize">${optionList(db.containers.map((container) => container.size), db.containers[0]?.size || "")}</select></label>
            <label>단가<input id="newRulePrice" type="number" min="1" placeholder="단가"></label>
          </div>
          <button class="primary-button" type="button" onclick="createPriceRule()">새 PriceRule 추가</button>
        </div>
      `;
    }

    function renderPriceRuleRow(rule, index) {
      return `
        <div class="line-item">
          <div class="price-grid">
            <label>품목<select id="rule${index}Item">${optionList(db.items, rule.item)}</select></label>
            <label>등급<select id="rule${index}Grade">${optionList(db.grades, rule.grade)}</select></label>
            <label>용기/사이즈<select id="rule${index}Size">${optionList(db.containers.map((container) => container.size), rule.containerSize)}</select></label>
            <label>단가<input id="rule${index}Price" type="number" min="1" value="${Number(rule.unitPrice || 0)}"></label>
          </div>
          <div class="button-row">
            <button class="secondary-button" type="button" onclick="savePriceRule(${index})">수정 저장</button>
            <button class="danger-button" type="button" onclick="deletePriceRule(${index})">삭제</button>
          </div>
        </div>
      `;
    }

    function readPriceRuleForm(prefix) {
      return normalizePriceRule({
        item: document.getElementById(`${prefix}Item`)?.value,
        grade: document.getElementById(`${prefix}Grade`)?.value,
        containerSize: document.getElementById(`${prefix}Size`)?.value,
        unitPrice: document.getElementById(`${prefix}Price`)?.value
      });
    }

    function createPriceRule() {
      if (!upsertPriceRule(readPriceRuleForm("newRule"))) return;
      renderAll();
      toast("새 단가를 저장했습니다.");
    }

    function savePriceRule(index) {
      const nextRule = readPriceRuleForm(`rule${index}`);
      if (!nextRule.item || !nextRule.grade || !nextRule.containerSize || !nextRule.unitPrice) {
        toast("품목, 등급, 사이즈, 단가를 확인하세요.");
        return;
      }
      db.priceRules.splice(index, 1);
      upsertPriceRule(nextRule, true);
      saveDb();
      renderAll();
      toast("단가표를 수정했습니다. 기존 입고 금액은 자동 변경되지 않습니다.");
    }

    function deletePriceRule(index) {
      if (!confirm("이 PriceRule을 삭제할까요? 기존 입고 금액은 변경되지 않습니다.")) return;
      db.priceRules.splice(index, 1);
      saveDb();
      renderAll();
      toast("PriceRule을 삭제했습니다.");
    }

    function toast(message) {
      const node = document.getElementById("toast");
      node.textContent = message;
      node.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => node.classList.remove("show"), 2200);
    }

    renderAll();
  </script>
</body>
</html>
