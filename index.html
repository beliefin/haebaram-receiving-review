<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#166534">
  <title>전자 입고확인서 MVP</title>
  <style>
    :root {
      --bg: #f5f7f1;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #637381;
      --line: #d7ded2;
      --primary: #166534;
      --primary-dark: #14532d;
      --accent: #b45309;
      --danger: #b91c1c;
      --blue: #1d4ed8;
      --shadow: 0 12px 28px rgba(22, 32, 42, 0.10);
      --radius: 8px;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 18px;
      line-height: 1.45;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(18, 32, 43, 0.07);
    }

    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 16px 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand strong { display: block; font-size: 22px; }
    .brand span { color: var(--muted); font-size: 14px; }

    .nav {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .nav button, .quick-button, .primary-button, .secondary-button, .ghost-button, .danger-button, .option-card, .qty-button {
      border-radius: var(--radius);
      min-height: 50px;
      border: 0;
      font-weight: 800;
    }

    .nav button {
      background: #edf1ed;
      color: #263238;
      padding: 12px 8px;
      font-size: 15px;
    }

    .nav button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 7px 18px rgba(22, 101, 52, 0.22);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 16px 36px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 16px;
    }

    h1, h2, h3 { margin: 0; line-height: 1.2; letter-spacing: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 24px; }
    h3 { font-size: 20px; }

    .muted { color: var(--muted); font-size: 15px; }

    .home-actions, .stats-grid, .line-list { display: grid; gap: 12px; }

    .quick-button {
      width: 100%;
      min-height: 86px;
      padding: 16px;
      background: var(--surface);
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }

    .quick-button strong { display: block; font-size: 22px; margin-bottom: 4px; }
    .quick-button .count {
      min-width: 52px;
      min-height: 52px;
      border-radius: 50%;
      background: #fff7ed;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
    }

    .panel, .confirm-card, .line-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 22px rgba(18, 32, 43, 0.07);
      margin-bottom: 14px;
    }

    .field { display: grid; gap: 8px; margin-bottom: 14px; }
    label { font-weight: 800; }

    input, select, textarea {
      width: 100%;
      min-height: 54px;
      border-radius: var(--radius);
      border: 2px solid var(--line);
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
    }

    textarea { min-height: 180px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(22, 101, 52, 0.18);
      border-color: var(--primary);
    }

    .option-grid, .qty-control {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .option-card {
      width: 100%;
      min-height: 78px;
      padding: 12px;
      background: #fff;
      border: 2px solid var(--line);
      text-align: left;
      color: var(--ink);
    }

    .option-card strong { display: block; font-size: 20px; margin-bottom: 4px; }
    .option-card.selected {
      border-color: var(--primary);
      background: #ecfdf3;
      box-shadow: 0 8px 18px rgba(22, 101, 52, 0.16);
    }

    .qty-control { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .qty-button {
      min-height: 58px;
      background: #fff7ed;
      color: #7c2d12;
      border: 2px solid #fed7aa;
      font-weight: 900;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .primary-button, .secondary-button, .ghost-button, .danger-button {
      min-height: 54px;
      padding: 12px 16px;
      font-weight: 900;
    }

    .primary-button { background: var(--primary); color: #fff; }
    .secondary-button { background: #25323a; color: #fff; }
    .ghost-button { background: #edf1ed; color: #263238; border: 1px solid var(--line); }
    .danger-button { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .money-box {
      display: grid;
      gap: 8px;
      background: #f7fbf8;
      border: 1px solid #cfe3d8;
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 12px;
    }

    .money-box b { font-size: 28px; }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7eef8;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.waiting { background: #fff7ed; color: #9a3412; }
    .badge.done { background: #eaf7ed; color: var(--primary); }
    .badge.pending-price { background: #fee2e2; color: var(--danger); }

    .summary-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #edf1ed;
      padding: 8px 0;
    }

    .confirm-preview {
      border: 3px solid var(--primary);
      background: #fff;
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .preview-no { font-size: 16px; color: var(--muted); font-weight: 800; }
    .preview-title { font-size: 30px; font-weight: 900; margin: 8px 0 14px; }

    .recipient-box {
      display: grid;
      gap: 6px;
      margin: 12px 0;
      padding: 16px;
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      background: #ecfdf3;
    }

    .recipient-box b {
      font-size: 30px;
      letter-spacing: 0;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-top: 12px;
    }

    table { border-collapse: collapse; width: 100%; min-width: 760px; font-size: 16px; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px; text-align: left; vertical-align: top; }
    th { background: #edf1ed; font-size: 14px; color: #34444d; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .filter-row .field { min-width: 220px; margin-bottom: 0; flex: 1; }
    .warning-panel { border-color: #fecaca; background: #fff7f7; }
    .status-split { display: grid; gap: 12px; }

    .empty {
      padding: 20px;
      border: 1px dashed #b9c4bd;
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      background: #17202a;
      color: #fff;
      padding: 14px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: none;
      font-weight: 800;
    }

    .toast.show { display: block; }

    @media (min-width: 760px) {
      .home-actions, .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .option-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .status-split { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (min-width: 1020px) {
      .home-actions { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .quick-button { min-height: 132px; align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand">
            <strong>전자 입고확인서</strong>
            <span id="todayLabel">문자 · 단가 · 입고 내역 · 현황 · 송금 프로토타입</span>
          </div>
          <button class="ghost-button" type="button" onclick="resetSample()">샘플 초기화</button>
        </div>
        <nav class="nav" aria-label="주요 화면">
          <button type="button" data-nav="home" class="active" onclick="showScreen('home')">홈</button>
          <button type="button" data-nav="send" onclick="showScreen('send')">문자</button>
          <button type="button" data-nav="price" onclick="showScreen('price')">단가 관리</button>
          <button type="button" data-nav="today" onclick="showScreen('today')">입고 확인 내역</button>
          <button type="button" data-nav="settlement" onclick="showScreen('settlement')">일자별 현황</button>
          <button type="button" data-nav="payment" onclick="showScreen('payment')">송금</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="screen-home" class="screen active"></section>
      <section id="screen-form" class="screen"></section>
      <section id="screen-preview" class="screen"></section>
      <section id="screen-price" class="screen"></section>
      <section id="screen-today" class="screen"></section>
      <section id="screen-send" class="screen"></section>
      <section id="screen-settlement" class="screen"></section>
      <section id="screen-payment" class="screen"></section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "haebaramConfirmAppV1";
    const PRICE_STORAGE_KEY = "haebaramConfirmPriceRules";
    const SMS_STATUS = ["문자대기", "문자앱열림", "전송완료", "재전송필요"];
    const PAYMENT_STATUS = ["송금대기", "송금완료"];
    const LEGACY_STATUS = ["문자대기", "문자앱열림", "전송완료표시", "재전송필요", "정산대기", "정산확정", "입금완료"];
    const ITEMS = ["사과", "배", "복숭아", "포도", "감귤"];
    const GRADES = ["A", "B", "C", "소"];
    const CONTAINERS = [
      { label: "20kg 상자", type: "상자", size: "20kg", kg: 20 },
      { label: "기타", type: "기타", size: "", kg: null }
    ];

    let priceRules = loadPriceRules();
    let db = loadDb();
    let currentScreen = "home";
    let draft = freshDraft();
    let selectedConfirmationId = "";
    let resendPhone = "";
    let receiptDateFilter = localDateISO();
    let dailyDateFilter = localDateISO();
    let paymentFilters = {
      dateFrom: localDateISO(),
      dateTo: localDateISO(),
      item: "",
      container: "",
      farmer: "",
      status: "미송금"
    };
    let selectedPaymentIds = new Set();

    function localDateISO(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function nowLocal() {
      const date = new Date();
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${localDateISO(date)}T${hour}:${minute}`;
    }

    function makeId(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
    }

    function money(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function number(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function digitsOnly(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function last4(value) {
      const digits = digitsOnly(value);
      return digits.slice(-4);
    }

    function normalizePriceRules(raw = {}) {
      return GRADES.reduce((rules, grade) => {
        const value = raw?.[grade];
        const numberValue = value === "" || value === null || value === undefined ? null : Number(value);
        rules[grade] = Number.isFinite(numberValue) && numberValue > 0 ? Math.round(numberValue) : null;
        return rules;
      }, {});
    }

    function loadPriceRules() {
      try {
        return normalizePriceRules(JSON.parse(localStorage.getItem(PRICE_STORAGE_KEY) || "{}"));
      } catch (error) {
        console.warn("confirm app price rule parse failed", error);
        return normalizePriceRules();
      }
    }

    function savePriceRules() {
      priceRules = normalizePriceRules(priceRules);
      localStorage.setItem(PRICE_STORAGE_KEY, JSON.stringify(priceRules));
    }

    function priceInputValue(grade) {
      return priceRules[grade] ? String(priceRules[grade]) : "";
    }

    function parseKgValue(value) {
      const numberValue = Number(String(value || "").replace(/[^\d.]/g, ""));
      return Number.isFinite(numberValue) && numberValue > 0 ? numberValue : 0;
    }

    function normalizeStatusFields(row) {
      const legacyStatus = row?.status || row?.smsStatus || "문자대기";
      let smsStatus = SMS_STATUS.includes(row?.smsStatus) ? row.smsStatus : "";
      let paymentStatus = PAYMENT_STATUS.includes(row?.paymentStatus) ? row.paymentStatus : "송금대기";

      if (!smsStatus) {
        if (["전송완료표시", "정산대기", "정산확정", "입금완료"].includes(legacyStatus)) smsStatus = "전송완료";
        else if (SMS_STATUS.includes(legacyStatus)) smsStatus = legacyStatus;
        else smsStatus = "문자대기";
      }

      if (legacyStatus === "입금완료") paymentStatus = "송금완료";
      return { smsStatus, paymentStatus, legacyStatus };
    }

    function normalizeLine(line) {
      const count = Number(line?.count || 0);
      const unitPrice = line?.unitPrice === null || line?.unitPrice === undefined ? null : Number(line.unitPrice);
      const customKg = line?.customKg === null || line?.customKg === undefined ? parseKgValue(line?.containerSize) : parseKgValue(line.customKg);
      const pricePending = Boolean(line?.pricePending || unitPrice === null || line?.amount === null);
      return {
        id: line?.id || makeId("line"),
        item: line?.item || "",
        grade: line?.grade || "",
        containerType: line?.containerType || "",
        containerSize: line?.containerSize || "",
        customKg,
        baseUnitKg: Number(line?.baseUnitKg || 20),
        baseUnitPrice: line?.baseUnitPrice === null || line?.baseUnitPrice === undefined ? unitPrice : Number(line.baseUnitPrice),
        count,
        unitPrice,
        amount: pricePending ? null : Number(line?.amount ?? count * unitPrice),
        pricePending
      };
    }

    function loadDb() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createSeedDb();
      try {
        const parsed = JSON.parse(raw);
        return { confirmations: (parsed.confirmations || []).map(normalizeConfirmation) };
      } catch (error) {
        console.warn("confirm app storage parse failed", error);
        return createSeedDb();
      }
    }

    function normalizeConfirmation(row) {
      const { smsStatus, paymentStatus } = normalizeStatusFields(row);
      const receivedAt = row?.receivedAt || row?.createdAt || nowLocal();
      const phone = row?.phone || "";
      return {
        id: row?.id || makeId("confirm"),
        no: row?.no || `EC-${localDateISO().replaceAll("-", "")}-LEGACY`,
        farmerName: row?.farmerName || "농가명 미입력",
        phone,
        phoneLast4: row?.phoneLast4 || last4(phone),
        bankName: row?.bankName || "",
        accountNo: row?.accountNo || "",
        accountHolder: row?.accountHolder || row?.farmerName || "",
        receivedAt,
        receivedDate: row?.receivedDate || receivedAt.slice(0, 10) || localDateISO(),
        smsStatus,
        paymentStatus,
        paymentCompletedAt: row?.paymentCompletedAt || "",
        status: smsStatus,
        lines: Array.isArray(row?.lines) ? row.lines.map(normalizeLine) : [],
        isRevision: Boolean(row?.isRevision || smsStatus === "재전송필요"),
        createdAt: row?.createdAt || nowLocal(),
        updatedAt: row?.updatedAt || nowLocal()
      };
    }

    function createSeedDb() {
      return {
        confirmations: [
          {
            id: "C001",
            no: `EC-${localDateISO().replaceAll("-", "")}-001`,
            farmerName: "김해숙 농가",
            phone: "010-0000-7788",
            phoneLast4: "7788",
            bankName: "농협",
            accountNo: "샘플-계좌-001",
            accountHolder: "김해숙",
            receivedAt: `${localDateISO()}T08:30`,
            receivedDate: localDateISO(),
            smsStatus: "전송완료",
            paymentStatus: "송금대기",
            paymentCompletedAt: "",
            status: "전송완료",
            lines: [
              makeLine("사과", "A", "상자", "20kg", 5, 20),
              makeLine("사과", "B", "상자", "20kg", 2, 20)
            ],
            createdAt: `${localDateISO()}T08:30`,
            updatedAt: `${localDateISO()}T08:40`
          }
        ]
      };
    }

    function saveDb() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function freshDraft() {
      const seq = String((db?.confirmations?.length || 0) + 1).padStart(3, "0");
      return {
        id: "",
        no: `EC-${localDateISO().replaceAll("-", "")}-${seq}`,
        farmerName: "",
        phone: "",
        bankName: "",
        accountNo: "",
        accountHolder: "",
        receivedAt: nowLocal(),
        receivedDate: localDateISO(),
        smsStatus: "문자대기",
        paymentStatus: "송금대기",
        paymentCompletedAt: "",
        status: "문자대기",
        phoneLast4: "",
        originalStatus: "",
        originalSmsStatus: "",
        originalLineSignature: "",
        isRevision: false,
        createdAt: "",
        autoFillNotice: "",
        line: { item: "", grade: "", containerType: "", containerSize: "", customKg: 0, count: 1 },
        lines: []
      };
    }

    function resetSample() {
      if (!confirm("샘플 데이터를 초기화할까요? 현재 브라우저 저장 데이터가 바뀝니다.")) return;
      db = createSeedDb();
      saveDb();
      draft = freshDraft();
      selectedConfirmationId = "";
      renderAll();
      toast("샘플 데이터가 초기화되었습니다.");
    }

    function findPrice(grade) {
      const unitPrice = priceRules[grade];
      return Number.isFinite(unitPrice) && unitPrice > 0 ? Number(unitPrice) : null;
    }

    function lineKg(containerType, containerSize, customKg) {
      if (containerType === "상자" && containerSize === "20kg") return 20;
      if (containerType === "기타") return parseKgValue(customKg || containerSize);
      return parseKgValue(customKg || containerSize);
    }

    function makeLine(item, grade, containerType, containerSize, count, customKg = 0) {
      const unitPrice = findPrice(grade);
      const kg = lineKg(containerType, containerSize, customKg);
      const hasCalculableKg = containerType !== "기타" || kg > 0;
      const amount = unitPrice === null || !hasCalculableKg ? null : Math.round(unitPrice * (kg / 20) * Number(count || 0));
      return {
        id: makeId("line"),
        item,
        grade,
        containerType,
        containerSize: containerType === "기타" ? (kg > 0 ? `${kg}kg` : "kg 미입력") : containerSize,
        customKg: kg,
        baseUnitKg: 20,
        baseUnitPrice: unitPrice,
        count: Number(count || 0),
        unitPrice,
        amount,
        pricePending: amount === null
      };
    }

    function isPricePending(line) {
      return line.pricePending || line.unitPrice === null || line.amount === null;
    }

    function payableAmount(line) {
      return isPricePending(line) ? 0 : Number(line.amount || 0);
    }

    function totalAmount(lines) {
      return lines.reduce((sum, line) => sum + payableAmount(line), 0);
    }

    function pendingCount(lines) {
      return lines.filter(isPricePending).length;
    }

    function amountLabel(line) {
      return isPricePending(line) ? "단가 미정 / 정산 확인 필요" : money(line.amount);
    }

    function priceLabel(line) {
      return isPricePending(line) ? "단가 미정" : money(line.unitPrice);
    }

    function containerDisplay(line) {
      if (line.containerType === "기타") return `기타 ${line.customKg > 0 ? line.customKg + "kg" : "kg 미입력"}`;
      if (line.containerType === "상자" && line.containerSize === "20kg") return "20kg 상자";
      return `${line.containerType || "용기"} ${line.containerSize || ""}`.trim();
    }

    function todayConfirmations() {
      return confirmationsByDate(localDateISO());
    }

    function confirmationDate(confirmation) {
      return confirmation.receivedDate || (confirmation.receivedAt || "").slice(0, 10) || localDateISO();
    }

    function confirmationsByDate(date) {
      return db.confirmations.filter((confirmation) => confirmationDate(confirmation) === date);
    }

    function sendWaitingRows() {
      return db.confirmations.filter((row) => ["문자대기", "문자앱열림", "재전송필요"].includes(row.smsStatus));
    }

    function statusForBadge(status) {
      if (status === "재전송필요") return "pending-price";
      if (status === "전송완료" || status === "송금완료") return "done";
      return "waiting";
    }

    function sentLikeStatus(status) {
      return ["전송완료", "전송완료표시", "정산대기", "정산확정", "입금완료"].includes(status);
    }

    function payableConfirmationRows(rows) {
      return rows.filter((row) => row.smsStatus === "전송완료");
    }

    function hasPaymentAccount(row) {
      return Boolean((row.bankName || "").trim() && (row.accountNo || "").trim() && (row.accountHolder || "").trim());
    }

    function hasPositivePayableAmount(row) {
      return totalAmount(row.lines || []) > 0 && pendingCount(row.lines || []) === 0;
    }

    function isPaymentBaseEligible(row) {
      return row.smsStatus === "전송완료" && hasPositivePayableAmount(row) && hasPaymentAccount(row);
    }

    function itemSummary(row) {
      const items = [...new Set((row.lines || []).map((line) => line.item).filter(Boolean))];
      return items.join(", ") || "품목 없음";
    }

    function containerSummary(row) {
      const containers = [...new Set((row.lines || []).map(containerDisplay))];
      return containers.join(", ") || "용기 없음";
    }

    function totalQuantity(lines) {
      return (lines || []).reduce((sum, line) => sum + Number(line.count || 0), 0);
    }

    function lineSignature(lines) {
      return JSON.stringify((lines || []).map((line) => ({
        item: line.item,
        grade: line.grade,
        containerType: line.containerType,
        containerSize: line.containerSize,
        customKg: Number(line.customKg || 0),
        baseUnitKg: Number(line.baseUnitKg || 20),
        baseUnitPrice: line.baseUnitPrice,
        count: Number(line.count || 0),
        unitPrice: line.unitPrice,
        amount: line.amount,
        pricePending: Boolean(line.pricePending)
      })));
    }

    function draftNeedsResend() {
      return Boolean(draft.id && sentLikeStatus(draft.originalSmsStatus || draft.originalStatus) && lineSignature(draft.lines) !== draft.originalLineSignature);
    }

    function isRevisionMessage(source) {
      return Boolean(source.isRevision || source.smsStatus === "재전송필요" || source.status === "재전송필요");
    }

    function renderAll() {
      document.getElementById("todayLabel").textContent = `${localDateISO()} · localStorage 검토용`;
      renderHome();
      renderForm();
      renderPreview();
      renderPrice();
      renderToday();
      renderSend();
      renderSettlement();
      renderPayment();
      setActiveNav();
    }

    function showScreen(name) {
      currentScreen = name;
      document.querySelectorAll(".screen").forEach((node) => node.classList.remove("active"));
      document.getElementById(`screen-${name}`).classList.add("active");
      if (name === "form") renderForm();
      if (name === "preview") renderPreview();
      setActiveNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setActiveNav() {
      document.querySelectorAll("[data-nav]").forEach((button) => {
        button.classList.toggle("active", button.dataset.nav === currentScreen);
      });
    }

    function startNew() {
      draft = freshDraft();
      resendPhone = "";
      showScreen("form");
    }

    function editConfirmation(id) {
      const confirmation = db.confirmations.find((row) => row.id === id);
      if (!confirmation) return;
      draft = {
        id: confirmation.id,
        no: confirmation.no,
        farmerName: confirmation.farmerName,
        phone: confirmation.phone || "",
        phoneLast4: confirmation.phoneLast4 || "",
        bankName: confirmation.bankName || "",
        accountNo: confirmation.accountNo || "",
        accountHolder: confirmation.accountHolder || "",
        receivedAt: confirmation.receivedAt,
        receivedDate: confirmationDate(confirmation),
        smsStatus: confirmation.smsStatus,
        paymentStatus: confirmation.paymentStatus || "송금대기",
        paymentCompletedAt: confirmation.paymentCompletedAt || "",
        status: confirmation.smsStatus,
        originalStatus: confirmation.smsStatus,
        originalSmsStatus: confirmation.smsStatus,
        originalLineSignature: lineSignature(confirmation.lines),
        isRevision: Boolean(confirmation.isRevision),
        createdAt: confirmation.createdAt,
        autoFillNotice: "",
        line: { item: "", grade: "", containerType: "", containerSize: "", customKg: 0, count: 1 },
        lines: confirmation.lines.map((line) => ({ ...line }))
      };
      resendPhone = "";
      toast("수정 후 다시 문자를 보내야 할 수 있습니다.");
      showScreen("form");
    }

      const today = todayConfirmations();

      document.getElementById("screen-home").innerHTML = `
        <div class="section-head">
          <div>
            <h1>현장 홈</h1>
            <p class="muted">입고 확인서를 작성하고 문자앱으로 보내며, 일자별 현황을 확인합니다.</p>
          </div>
        </div>
        <div class="home-actions">
          <button class="quick-button" type="button" onclick="showScreen('send')">
            <span><strong>문자</strong><span class="muted">작성, 문자앱 열기, 전송 표시</span></span>
            <span class="count">+</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('today')">
            <span><strong>입고 확인 내역</strong><span class="muted">일자별 확인서와 상세 줄</span></span>
            <span class="count">${today.length}</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('send')">
            <span><strong>문자 전송 대기</strong><span class="muted">문자대기/문자앱열림/재전송필요</span></span>
            <span class="count">${sendWaiting.length}</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('price')">

            <span class="count">₩</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('settlement')">
            <span><strong>일자별 현황</strong><span class="muted">과일, 용기, 농가별 집계</span></span>
            <span class="count">${today.length}</span>
          </button>
          <button class="quick-button" type="button" onclick="showScreen('payment')">
            <span><strong>송금</strong><span class="muted">미송금 대상 확인과 완료 표시</span></span>
            <span class="count">${paymentWaiting}</span>
          </button>
        </div>
      `;
    }

    function renderPrice() {
      document.getElementById("screen-price").innerHTML = `
        <div class="section-head">
          <div>
            <h1>단가 관리</h1>
            <p class="muted">A, B, C, 소 등급별 20kg 기준 단가를 이 브라우저 localStorage에 저장합니다.</p>
          </div>
          <button class="ghost-button" type="button" onclick="showScreen('home')">홈으로</button>
        </div>
        <div class="panel">
          <h2>20kg 기준 단가</h2>
          <p class="muted">실운영 서버 단가표가 아니라 검토용 브라우저 저장 단가표입니다. 빈 값이면 해당 등급은 단가미정으로 처리됩니다.</p>
          ${GRADES.map((grade) => `
            <div class="field">
              <label for="price-${grade}">${grade} 등급 20kg 기준 단가</label>
              <input id="price-${grade}" type="number" min="0" inputmode="numeric" value="${escapeHtml(priceInputValue(grade))}" oninput="priceRules['${grade}'] = this.value" placeholder="예: 50000">
            </div>

          <div class="button-row">
            <button class="primary-button" type="button" onclick="savePriceRulesAndRender()">단가 저장</button>
          </div>
        </div>
      `;
    }

    function savePriceRulesAndRender() {
      savePriceRules();
      renderAll();
      showScreen("price");
      toast("20kg 기준 단가를 저장했습니다.");
    }

    function historyRows() {
      return [...db.confirmations].sort((a, b) => {
        const aTime = a.updatedAt || a.createdAt || a.receivedAt || "";
        const bTime = b.updatedAt || b.createdAt || b.receivedAt || "";
        return bTime.localeCompare(aTime);
      });
    }

    function uniqueHistoryOptions(key) {
      const seen = new Set();
      return historyRows().map((row) => key === "phone" ? row.phone : row[key]).filter((value) => {
        const text = String(value || "").trim();
        if (!text || seen.has(text)) return false;
        seen.add(text);
        return true;
      });
    }

    function findHistoryMatch(key, value) {
      const text = String(value || "").trim();
      if (!text) return null;
      return historyRows().find((row) => {
        if (key === "phone") return digitsOnly(row.phone) === digitsOnly(text);
        return String(row[key] || "").trim() === text;
      }) || null;
    }

    function applyHistoryMatch(match, source) {
      if (!match) return false;
      if (source !== "farmerName") draft.farmerName = match.farmerName || draft.farmerName;
      if (source !== "phone") draft.phone = match.phone || draft.phone;
      if (source !== "accountNo") draft.accountNo = match.accountNo || draft.accountNo;
      draft.bankName = match.bankName || draft.bankName;
      draft.accountHolder = match.accountHolder || draft.accountHolder;
      draft.autoFillNotice = "과거 이력에서 전화번호와 계좌정보를 불러왔습니다.";
      renderForm();
      return true;
    }

    function handleHistoryInput(key, value) {
      draft[key] = value;
      const match = findHistoryMatch(key, value);
      if (match) applyHistoryMatch(match, key);
    }

    function renderForm() {
      const line = draft.line;
      const selectedContainer = line.containerType === "기타"
        ? `기타 ${line.customKg > 0 ? line.customKg + "kg" : "kg 미입력"}`
        : (line.containerType === "상자" && line.containerSize === "20kg" ? "20kg 상자" : (line.containerType && line.containerSize ? `${line.containerType} ${line.containerSize}` : "미선택"));
      document.getElementById("screen-form").innerHTML = `
        <div class="section-head">
          <div>
            <h1>${draft.id ? "입고확인서 수정" : "입고확인서 작성"}</h1>
            <p class="muted">문자앱 열기와 송금 대상 확인을 위해 전화번호와 계좌정보를 저장합니다.</p>
          </div>
          <button class="ghost-button" type="button" onclick="showScreen('home')">홈으로</button>
        </div>
        <div class="panel">
          <div class="field">
            <label for="farmerName">농가명</label>
            <input id="farmerName" list="farmerNameOptions" value="${escapeHtml(draft.farmerName)}" oninput="handleHistoryInput('farmerName', this.value)" placeholder="예: 김해숙 농가">
            <datalist id="farmerNameOptions">${uniqueHistoryOptions("farmerName").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
          </div>
          <div class="field">
            <label for="farmerPhone">전화번호</label>
            <input id="farmerPhone" list="farmerPhoneOptions" inputmode="tel" value="${escapeHtml(draft.phone)}" oninput="handleHistoryInput('phone', this.value)" placeholder="예: 010-0000-0000">
            <datalist id="farmerPhoneOptions">${uniqueHistoryOptions("phone").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
            <span class="muted">${draft.phone ? "전체 번호를 저장합니다." : phoneDisplay(draft)}</span>
          </div>
          <div class="field">
            <label for="bankName">은행명</label>
            <input id="bankName" value="${escapeHtml(draft.bankName)}" oninput="draft.bankName = this.value" placeholder="예: 농협">
          </div>
          <div class="field">
            <label for="accountNo">계좌번호</label>
            <input id="accountNo" list="accountNoOptions" inputmode="numeric" value="${escapeHtml(draft.accountNo)}" oninput="handleHistoryInput('accountNo', this.value)" placeholder="검토용 계좌번호">
            <datalist id="accountNoOptions">${uniqueHistoryOptions("accountNo").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
          </div>
          <div class="field">
            <label for="accountHolder">예금주</label>
            <input id="accountHolder" value="${escapeHtml(draft.accountHolder)}" oninput="draft.accountHolder = this.value" placeholder="예: 김해숙">
          </div>
          ${draft.autoFillNotice ? `<p class="muted">${escapeHtml(draft.autoFillNotice)}</p>` : ""}
          <p class="muted">현재는 브라우저 localStorage 기반 검토용입니다. 실운영 개인정보/계좌정보 저장에는 백엔드, 로그인, 권한, 백업이 필요합니다.</p>
        </div>
        ${draft.id && sentLikeStatus(draft.originalStatus) ? `
          <div class="panel">
            <span class="badge pending-price">전송 완료 후 수정 중</span>
            <p class="muted">품목, 등급, 용기, 수량, 단가 관련 상세 줄이 바뀌면 이 확인서는 재전송필요 상태가 되고 일자별 현황의 반영 가능 금액에서 제외됩니다.</p>
          </div>
        ` : ""}
        <div class="panel">
          <h2>상세 줄 추가</h2>
          <h3>품목</h3>
          <div class="option-grid">${ITEMS.map((item) => optionButton("item", item, line.item === item)).join("")}</div>
          <h3>등급</h3>
          <div class="option-grid">${GRADES.map((grade) => optionButton("grade", grade, line.grade === grade)).join("")}</div>
          <h3>용기/무게</h3>
          <div class="option-grid">${CONTAINERS.map((container) => {
            const selected = line.containerType === container.type && (container.type === "기타" || line.containerSize === container.size);
            return `<button class="option-card ${selected ? "selected" : ""}" type="button" onclick="selectContainer('${container.type}', '${container.size}', ${container.kg === null ? 0 : container.kg})"><strong>${container.label}</strong><span>20kg 기준 단가 적용</span></button>`;
          }).join("")}</div>
          ${line.containerType === "기타" ? `
            <div class="field">
              <label for="customKg">기타 kg</label>
              <input id="customKg" type="number" min="0" step="0.1" inputmode="decimal" value="${line.customKg || ""}" oninput="draft.line.customKg = Number(this.value || 0); draft.line.containerSize = draft.line.customKg > 0 ? draft.line.customKg + 'kg' : ''; renderForm();" placeholder="예: 12">
              <span class="muted">0보다 큰 kg이면 20kg 기준 단가에 비례해 계산합니다. 비어 있거나 0이면 단가미정으로 저장됩니다.</span>
            </div>
          ` : ""}
          <div class="money-box">
            <span class="muted">선택</span>
            <b>${escapeHtml(line.item || "품목")} · ${escapeHtml(line.grade || "등급")} · ${escapeHtml(selectedContainer)}</b>
            <span class="muted">${lineEstimateLabel()}</span>
          </div>
          ${renderQtyControls()}
          <div class="button-row">
            <button class="primary-button" type="button" onclick="addLine()" ${canAddLine() ? "" : "disabled"}>상세 줄 추가</button>
            <button class="ghost-button" type="button" onclick="clearLine()">현재 줄 초기화</button>
          </div>
        </div>
        <div class="panel">
          <h2>추가된 상세 줄</h2>
          ${renderLineList(draft.lines, true)}
          <div class="money-box">
            <span>정산 반영 합계</span>
            <b>${money(totalAmount(draft.lines))}</b>
            <span class="muted">단가 미정 ${pendingCount(draft.lines)}건 제외</span>
          </div>
          <div class="button-row">
            <button class="primary-button" type="button" onclick="goPreview()" ${canPreview() ? "" : "disabled"}>확인서 미리보기</button>
          </div>
        </div>
      `;
    }

    function optionButton(key, value, selected) {
      return `<button class="option-card ${selected ? "selected" : ""}" type="button" onclick="selectLineValue('${key}', '${value}')"><strong>${escapeHtml(value)}</strong><span>선택</span></button>`;
    }

    function selectLineValue(key, value) {
      draft.line[key] = value;
      renderForm();
    }

    function selectContainer(type, size, kg = 0) {
      draft.line.containerType = type;
      draft.line.containerSize = type === "기타" ? "" : size;
      draft.line.customKg = type === "기타" ? 0 : kg;
      renderForm();
    }

    function lineEstimateLabel() {
      if (!draft.line.grade) return "등급을 선택하면 20kg 기준 단가를 확인합니다.";
      const unitPrice = findPrice(draft.line.grade);
      if (unitPrice === null) return `${draft.line.grade} 등급 20kg 기준 단가 미정`;
      if (!draft.line.containerType) return `20kg 기준 단가 ${money(unitPrice)} · 용기를 선택하세요.`;
      const preview = makeLine(draft.line.item || "", draft.line.grade, draft.line.containerType, draft.line.containerSize, draft.line.count, draft.line.customKg);
      return isPricePending(preview) ? `20kg 기준 단가 ${money(unitPrice)} · kg 확인 필요` : `20kg 기준 단가 ${money(unitPrice)} · 예상 금액 ${money(preview.amount)}`;
    }

    function renderQtyControls() {
      const count = Number(draft.line.count || 0);
      return `
        <h3>수량</h3>
        <div class="qty-control">
          ${[-50, -10, -5, -1, 1, 5, 10, 50].map((delta) => `<button class="qty-button" type="button" onclick="changeCount(${delta})">${delta > 0 ? "+" : ""}${delta}</button>`).join("")}
        </div>
        <h3>빠른 수량</h3>
        <div class="qty-control">
          ${[1, 5, 10, 20, 30, 50].map((value) => `<button class="qty-button" type="button" onclick="setCount(${value})">${value}</button>`).join("")}
        </div>
        <div class="field">
          <label for="lineCount">개수 직접 입력</label>
          <input id="lineCount" type="number" min="0" value="${count}" oninput="draft.line.count = Math.max(0, Number(this.value || 0)); renderForm();">
        </div>
      `;
    }

    function changeCount(delta) {
      draft.line.count = Math.max(0, Number(draft.line.count || 0) + delta);
      renderForm();
    }

    function setCount(value) {
      draft.line.count = Math.max(0, Number(value || 0));
      renderForm();
    }

    function canAddLine() {
      const line = draft.line;
      return Boolean(line.item && line.grade && line.containerType && Number(line.count) > 0);
    }

    function addLine() {
      if (!canAddLine()) {
        toast("품목, 등급, 용기, 1개 이상 수량을 확인하세요.");
        return;
      }
      draft.lines.push(makeLine(draft.line.item, draft.line.grade, draft.line.containerType, draft.line.containerSize, draft.line.count, draft.line.customKg));
      clearLine(false);
      renderForm();
      toast("상세 줄을 추가했습니다.");
    }

    function clearLine(render = true) {
      draft.line = { item: "", grade: "", containerType: "", containerSize: "", customKg: 0, count: 1 };
      if (render) renderForm();
    }

    function removeDraftLine(lineId) {
      draft.lines = draft.lines.filter((line) => line.id !== lineId);
      renderForm();
    }

    function canPreview() {
      return draft.farmerName.trim() && digitsOnly(draft.phone).length >= 8 && draft.lines.length && draft.lines.every((line) => Number(line.count) > 0);
    }

    function goPreview() {
      if (!canPreview()) {
        toast("농가명, 전화번호, 상세 줄을 확인하세요.");
        return;
      }
      draft.receivedAt = nowLocal();
      draft.receivedDate = draft.receivedAt.slice(0, 10);
      if (draftNeedsResend()) {
        draft.smsStatus = "재전송필요";
        draft.status = "재전송필요";
        draft.isRevision = true;
        saveDraft("재전송필요");
        toast("수정 후 다시 문자를 보내야 합니다.");
      }
      showScreen("preview");
    }

    function renderLineList(lines, removable = false) {
      if (!lines.length) return "<div class='empty'>상세 줄이 없습니다.</div>";
      return `<div class="line-list">${lines.map((line, index) => `
        <div class="line-item">
          <div class="section-head" style="margin:0;">
            <h3>${index + 1}. ${escapeHtml(line.item)} ${escapeHtml(line.grade)}</h3>
            <span class="badge ${isPricePending(line) ? "pending-price" : "done"}">${amountLabel(line)}</span>
          </div>
          <div class="muted">${escapeHtml(containerDisplay(line))} · ${number(line.count)}개 · 20kg 기준 단가 ${priceLabel(line)}</div>
          ${removable ? `<button class="danger-button" type="button" onclick="removeDraftLine('${line.id}')">이 줄 삭제</button>` : ""}
        </div>
      `).join("")}</div>`;
    }

    function buildConfirmationFromDraft() {
      const now = nowLocal();
      return {
        id: draft.id || makeId("confirm"),
        no: draft.no,
        farmerName: draft.farmerName.trim(),
        phone: draft.phone.trim(),
        phoneLast4: last4(draft.phone) || draft.phoneLast4 || "",
        bankName: draft.bankName.trim(),
        accountNo: draft.accountNo.trim(),
        accountHolder: draft.accountHolder.trim(),
        receivedAt: draft.receivedAt || now,
        receivedDate: (draft.receivedAt || now).slice(0, 10),
        smsStatus: draft.smsStatus || draft.status || "문자대기",
        paymentStatus: draft.paymentStatus || "송금대기",
        paymentCompletedAt: draft.paymentCompletedAt || "",
        status: draft.smsStatus || draft.status || "문자대기",
        lines: draft.lines.map((line) => ({ ...line })),
        isRevision: Boolean(draft.isRevision),
        createdAt: draft.createdAt || now,
        updatedAt: now
      };
    }

    function saveDraft(status = "문자대기") {
      const isRevisionAdvance =
        draftNeedsResend() &&
        draft.isRevision &&
        ((draft.smsStatus === "재전송필요" && status === "문자앱열림") ||
          (draft.smsStatus === "문자앱열림" && status === "전송완료"));

      if (draftNeedsResend() && status !== "재전송필요" && !isRevisionAdvance) {
        status = "재전송필요";
        draft.smsStatus = "재전송필요";
        draft.status = "재전송필요";
        draft.isRevision = true;
      }

      const confirmation = buildConfirmationFromDraft();
      confirmation.smsStatus = status;
      confirmation.status = status;
      const existing = db.confirmations.findIndex((row) => row.id === confirmation.id);
      if (existing >= 0) db.confirmations[existing] = confirmation;
      else db.confirmations.push(confirmation);
      saveDb();
      selectedConfirmationId = confirmation.id;
      draft.id = confirmation.id;
      draft.smsStatus = confirmation.smsStatus;
      draft.status = confirmation.smsStatus;
      renderAll();
      return confirmation;
    }

    function renderPreview() {

    function renderPreviewCard(source, isDraft = false) {
      const lines = source.lines || [];
      return `
        <div class="confirm-preview">
          <div class="preview-no">NO ${escapeHtml(source.no)}</div>
          <div class="preview-title">${escapeHtml(source.farmerName || "농가명 미입력")} 입고확인서</div>
          <ul class="summary-list">
            <li><span>입고일시</span><b>${escapeHtml((source.receivedAt || "").replace("T", " "))}</b></li>
            <li><span>문자상태</span><b>${escapeHtml(source.smsStatus || source.status || "문자대기")}</b></li>
            <li><span>송금상태</span><b>${escapeHtml(source.paymentStatus || "송금대기")}</b></li>
            <li><span>전화번호</span><b>${escapeHtml(phoneDisplay(source))}</b></li>

            <li><span>정산 반영 합계</span><b>${money(totalAmount(lines))}</b></li>
            <li><span>단가 미정 건수</span><b>${pendingCount(lines)}건</b></li>
          </ul>
          ${renderLineList(lines, false)}
        </div>
      `;
    }

    function buildMessage(source) {
      const lines = source.lines || [];
      const lineText = lines.map((line, index) => {
        return `${index + 1}. ${line.item} ${line.grade} ${containerDisplay(line)} ${line.count}개 / ${amountLabel(line)}`;
      }).join("\n");
      const title = isRevisionMessage(source) ? "[해바람 입고확인 수정본]" : "[해바람 입고확인]";
      const detailLabel = isRevisionMessage(source) ? "수정된 상세 줄" : "상세 줄";
      return `${title}\n입고번호: ${source.no}\n농가명: ${source.farmerName}\n${detailLabel}:\n${lineText}\n정산 반영 합계: ${money(totalAmount(lines))}\n단가 미정 건수: ${pendingCount(lines)}건\n내용이 다르면 연락 바랍니다.`;
    }

    function smsHref(phone, message) {
      const digits = digitsOnly(phone);
      return `sms:${digits}?body=${encodeURIComponent(message)}`;
    }

    function formatPhoneForDisplay(phone) {
      const digits = digitsOnly(phone);
      if (digits.length === 11) return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
      if (digits.length === 10) return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6)}`;
      return phone || "전화번호 미입력";
    }

    function phoneDisplay(source) {
      if (source?.phone) return formatPhoneForDisplay(source.phone);
      if (source?.phoneLast4) return `기존 데이터: 전체 번호 없음 (뒤 4자리 ${source.phoneLast4})`;
      return "전화번호 미입력";
    }

    function accountDisplay(source) {
      const parts = [source?.bankName, source?.accountNo, source?.accountHolder].filter(Boolean);
      return parts.length ? parts.join(" / ") : "계좌정보 미입력";
    }

    function markSmsOpened() {

              <button class="secondary-button" type="button" onclick="updateSmsStatus('${confirmation.id}', '전송완료')">문자 전송 후 완료로 표시</button>

    function updateSmsStatus(id, status) {

      const rows = sendWaitingRows();
      const selected = db.confirmations.find((row) => row.id === selectedConfirmationId) || rows[0];
      const resendTargetPhone = selected ? (resendPhone || selected.phone || "") : "";

      document.getElementById("screen-send").innerHTML = `
        <div class="section-head">
          <div>
            <h1>문자</h1>
            <p class="muted">입고확인서를 작성하고 문자앱을 열어 전송 상태를 표시합니다.</p>
          </div>
          <button class="primary-button" type="button" onclick="startNew()">새 입고확인서 작성</button>
        </div>
        ${selected ? renderPreviewCard(selected, false) : "<div class='empty'>문자 전송 대기 확인서가 없습니다.</div>"}
        ${selected ? `
          <div class="panel">
            <h2>${selected.smsStatus === "재전송필요" ? "수정본 문자 보내기" : "저장된 문구"}</h2>
            ${selected.smsStatus === "재전송필요" ? `
              <div class="field">
                <label for="resendPhone">재전송 전화번호</label>

                <span class="muted">${selected.phone ? "저장된 번호를 기본으로 사용합니다. 필요한 경우 이번 문자만 수정하세요." : "기존 데이터에는 전체 번호가 없어 다시 입력해야 합니다."}</span>
              </div>

            <textarea readonly>${escapeHtml(buildMessage(selected))}</textarea>

                <a class="primary-button" href="${resendDigits.length >= 8 ? smsHref(resendTargetPhone, buildMessage(selected)) : "#"}" onclick="return markStoredSmsOpened('${selected.id}')">수정본 문자앱 열기</a>
                <span class="muted">수정본 문자앱을 연 뒤 완료 표시가 가능합니다.</span>
              ` : `<button class="primary-button" type="button" onclick="updateSmsStatus('${selected.id}', '전송완료')">문자 전송 후 완료로 표시</button>`}
            </div>

    function markStoredSmsOpened(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);

      return true;
    }

    async function copyStoredMessage(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row) return;
      try {
        await navigator.clipboard.writeText(buildMessage(row));
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = buildMessage(row);
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      toast("저장된 확인서 문구를 복사했습니다.");
    }

    function aggregateRows(rows, keyFn) {
      const map = new Map();
      rows.forEach((confirmation) => {
        (confirmation.lines || []).forEach((line) => {
          const key = keyFn(confirmation, line);
          if (!map.has(key)) map.set(key, { key, count: 0, total: 0, pending: 0, confirmations: new Set() });
          const row = map.get(key);
          row.count += Number(line.count || 0);
          row.total += payableAmount(line);
          row.pending += isPricePending(line) ? 1 : 0;
          row.confirmations.add(confirmation.no);
        });
      });
      return [...map.values()].map((row) => ({ ...row, confirmationCount: row.confirmations.size })).sort((a, b) => b.count - a.count);
    }

    function farmerAggregateRows(rows) {
      const map = new Map();
      rows.forEach((confirmation) => {
        if (!map.has(confirmation.farmerName)) {
          map.set(confirmation.farmerName, {
            key: confirmation.farmerName,
            count: 0,
            total: 0,
            pending: 0,
            confirmationCount: 0,
            phone: phoneDisplay(confirmation),
            account: accountDisplay(confirmation),
            nos: []
          });
        }
        const row = map.get(confirmation.farmerName);
        row.count += (confirmation.lines || []).reduce((sum, line) => sum + Number(line.count || 0), 0);
        row.total += totalAmount(confirmation.lines || []);
        row.pending += pendingCount(confirmation.lines || []);
        row.confirmationCount += 1;
        row.nos.push(confirmation.no);
      });
      return [...map.values()].sort((a, b) => b.total - a.total);
    }

    function dailySummary(rows) {
      const unsentRows = rows.filter((row) => ["문자대기", "문자앱열림"].includes(row.smsStatus));
      const sentRows = rows.filter((row) => row.smsStatus === "전송완료");
      const resendRows = rows.filter((row) => row.smsStatus === "재전송필요");
      const pendingRows = rows.filter((row) => pendingCount(row.lines) > 0);
      const pendingLineCount = rows.reduce((sum, row) => sum + pendingCount(row.lines), 0);
      const totalQuantity = rows.reduce((sum, row) => sum + (row.lines || []).reduce((lineSum, line) => lineSum + Number(line.count || 0), 0), 0);
      const payableTotal = sentRows.reduce((sum, row) => sum + totalAmount(row.lines), 0);
      return { unsentRows, sentRows, resendRows, pendingRows, pendingLineCount, totalQuantity, payableTotal };
    }

    function renderAggregateTable(title, rows, label = "구분") {

                  ${rows.map((row) => `

                      <td>${escapeHtml(row.key)}</td>
                      <td>${number(row.count)}</td>

                      <td>${number(row.pending)}</td>

                </tbody>
              </table>
            </div>
          ` : "<div class='empty'>집계할 상세 줄이 없습니다.</div>"}
        </div>

    function renderStatusList(title, rows) {

                <div>
                  <h3>${escapeHtml(row.no)}</h3>
                  <div class="muted">${escapeHtml(row.farmerName)} · ${escapeHtml(phoneDisplay(row))}</div>
                </div>
                <span class="badge ${statusForBadge(row.smsStatus)}">${escapeHtml(row.smsStatus)}</span>
              </div>
              <ul class="summary-list">
                <li><span>총액</span><b>${money(totalAmount(row.lines))}</b></li>

                <li><span>상세 줄</span><b>${row.lines.length}줄</b></li>
              </ul>
            </div>
          `).join("")}</div>` : "<div class='empty'>해당 확인서가 없습니다.</div>"}
        </div>
      `;

    function renderSettlement() {
      const rows = confirmationsByDate(dailyDateFilter).sort((a, b) => b.receivedAt.localeCompare(a.receivedAt));
      const summary = dailySummary(rows);
      const itemRows = aggregateRows(rows, (confirmation, line) => line.item || "품목 미입력");
      const containerRows = aggregateRows(rows, (confirmation, line) => containerDisplay(line));

      document.getElementById("screen-settlement").innerHTML = `

        <div class="stats-grid">

          <div class="panel">

          <div class="panel">
            <span class="muted">총 입고 수량</span>
            <h2>${number(summary.totalQuantity)}</h2>
          </div>
          <div class="panel">
            <span class="muted">정산 반영 가능 금액</span>
            <h2>${money(summary.payableTotal)}</h2>
          </div>
        </div>
        ${summary.resendRows.length ? `
          <div class="panel warning-panel">
            <h2>재전송필요 확인서</h2>
            <p class="muted">아래 확인서는 수정본 문자를 다시 보내기 전까지 반영 가능 금액에 포함하지 않습니다.</p>
            <div class="line-list">
              ${summary.resendRows.map((row) => `
                <div class="line-item">
                  <div class="section-head" style="margin:0;">
                    <div>
                      <h3>${escapeHtml(row.no)}</h3>
                      <div class="muted">${escapeHtml(row.farmerName)} · ${money(totalAmount(row.lines))} · 단가미정 ${pendingCount(row.lines)}건</div>
                    </div>
                    <span class="badge pending-price">재전송필요</span>
                  </div>
                  <div class="button-row">
                    <button class="primary-button" type="button" onclick="selectConfirmation('${row.id}')">수정본 문자 보내기</button>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}
        ${summary.pendingRows.length ? `
          <div class="panel warning-panel">
            <h2>단가미정 확인서</h2>
            <p class="muted">단가미정 상세 줄은 정산 반영 가능 금액에서 제외됩니다.</p>
            <div class="line-list">
              ${summary.pendingRows.map((row) => `
                <div class="line-item">
                  <h3>${escapeHtml(row.no)} · ${escapeHtml(row.farmerName)}</h3>
                  <div class="muted">단가미정 ${pendingCount(row.lines)}줄 · ${escapeHtml(phoneDisplay(row))}</div>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}
        <div class="status-split">
          ${renderStatusList("문자 미전송 확인서", summary.unsentRows)}
          ${renderStatusList("문자 전송 완료 확인서", summary.sentRows)}
        </div>
        ${renderAggregateTable("과일/품목별 집계", itemRows, "과일/품목")}
        ${renderAggregateTable("무게/용기별 집계", containerRows, "무게/용기")}
        ${renderAggregateTable("농가별 집계", farmerRows, "농가명")}
      `;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko-KR"));
    }

    function paymentDateRows() {
      const from = paymentFilters.dateFrom || "";
      const to = paymentFilters.dateTo || "";
      return db.confirmations.filter((row) => {
        const date = confirmationDate(row);
        return (!from || date >= from) && (!to || date <= to);
      });
    }

    function rowMatchesPaymentFilters(row) {
      const itemOk = !paymentFilters.item || (row.lines || []).some((line) => line.item === paymentFilters.item);
      const containerOk = !paymentFilters.container || (row.lines || []).some((line) => containerDisplay(line) === paymentFilters.container);
      const farmerOk = !paymentFilters.farmer || row.farmerName === paymentFilters.farmer;
      return itemOk && containerOk && farmerOk;
    }

    function paymentBaseRows() {
      return paymentDateRows().filter(rowMatchesPaymentFilters);
    }

    function paymentTargetRows(rows = paymentBaseRows()) {
      return rows.filter(isPaymentBaseEligible);
    }

    function paymentVisibleRows() {
      return paymentTargetRows().filter((row) => {
        if (paymentFilters.status === "미송금") return row.paymentStatus !== "송금완료";
        if (paymentFilters.status === "송금완료") return row.paymentStatus === "송금완료";
        return true;
      }).sort((a, b) => a.farmerName.localeCompare(b.farmerName, "ko-KR") || b.receivedAt.localeCompare(a.receivedAt));
    }

    function paymentFilterOptions() {
      const rows = paymentDateRows();
      return {
        items: uniqueSorted(rows.flatMap((row) => (row.lines || []).map((line) => line.item))),
        containers: uniqueSorted(rows.flatMap((row) => (row.lines || []).map(containerDisplay))),
        farmers: uniqueSorted(rows.map((row) => row.farmerName))
      };
    }

    function paymentExclusions() {
      const result = {
        unsent: [],
        resend: [],
        pendingPrice: [],
        missingAccount: []
      };
      paymentBaseRows().forEach((row) => {
        if (row.smsStatus === "재전송필요") result.resend.push(row);
        else if (row.smsStatus !== "전송완료") result.unsent.push(row);
        else if (!hasPositivePayableAmount(row)) result.pendingPrice.push(row);
        else if (!hasPaymentAccount(row)) result.missingAccount.push(row);
      });
      return result;
    }

    function paymentDashboard(rows) {
      const unpaidRows = rows.filter((row) => row.paymentStatus !== "송금완료");
      const doneRows = rows.filter((row) => row.paymentStatus === "송금완료");
      return {
        targetPeople: new Set(rows.map((row) => row.farmerName)).size,
        unpaidPeople: new Set(unpaidRows.map((row) => row.farmerName)).size,
        donePeople: new Set(doneRows.map((row) => row.farmerName)).size,
        unpaidTotal: unpaidRows.reduce((sum, row) => sum + totalAmount(row.lines), 0),
        doneTotal: doneRows.reduce((sum, row) => sum + totalAmount(row.lines), 0),
        grandTotal: rows.reduce((sum, row) => sum + totalAmount(row.lines), 0)
      };
    }

    function paymentAggregateRows(rows, keyFn) {
      const map = new Map();
      rows.forEach((confirmation) => {
        (confirmation.lines || []).forEach((line) => {
          const key = keyFn(confirmation, line);
          if (!map.has(key)) map.set(key, { key, quantity: 0, total: 0, confirmations: new Set(), farmers: new Set() });
          const row = map.get(key);
          row.quantity += Number(line.count || 0);
          row.total += payableAmount(line);
          row.confirmations.add(confirmation.no);
          row.farmers.add(confirmation.farmerName);
        });
      });
      return [...map.values()].map((row) => ({
        key: row.key,
        quantity: row.quantity,
        total: row.total,
        confirmationCount: row.confirmations.size,
        farmerCount: row.farmers.size
      })).sort((a, b) => b.total - a.total);
    }

    function renderPaymentAggregateTable(title, rows, label) {
      return `
        <div class="panel">
          <h2>${title}</h2>
          ${rows.length ? `
            <div class="table-wrap">
              <table>
                <thead><tr><th>${label}</th><th>총 수량</th><th>확인서 수</th><th>농가 수</th><th>송금 대상 금액</th></tr></thead>
                <tbody>
                  ${rows.map((row) => `
                    <tr>
                      <td>${escapeHtml(row.key)}</td>
                      <td>${number(row.quantity)}</td>
                      <td>${number(row.confirmationCount)}</td>
                      <td>${number(row.farmerCount)}</td>
                      <td>${money(row.total)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          ` : "<div class='empty'>집계할 송금 대상이 없습니다.</div>"}
        </div>
      `;
    }

    function renderPaymentExclusionPanel(title, rows, reason) {
      return `
        <div class="panel warning-panel">
          <h2>${title}</h2>
          <p class="muted">${reason}</p>
          ${rows.length ? `<div class="line-list">${rows.map((row) => `
            <div class="line-item">
              <div class="section-head" style="margin:0;">
                <div>
                  <h3>${escapeHtml(row.no)}</h3>
                  <div class="muted">${escapeHtml(row.farmerName)} · ${escapeHtml(phoneDisplay(row))}</div>
                </div>
                <span class="badge ${statusForBadge(row.smsStatus)}">${escapeHtml(row.smsStatus)}</span>
              </div>
              <ul class="summary-list">
                <li><span>입고일자</span><b>${escapeHtml(confirmationDate(row))}</b></li>
                <li><span>계좌정보</span><b>${escapeHtml(accountDisplay(row))}</b></li>
                <li><span>단가미정</span><b>${pendingCount(row.lines)}건</b></li>
                <li><span>금액</span><b>${money(totalAmount(row.lines))}</b></li>
              </ul>
            </div>
          `).join("")}</div>` : "<div class='empty'>해당 확인서가 없습니다.</div>"}
        </div>
      `;
    }

    function renderPaymentCard(row) {
      const checked = selectedPaymentIds.has(row.id) ? "checked" : "";
      const unpaid = row.paymentStatus !== "송금완료";
      return `
        <div class="confirm-card">
          <div class="section-head" style="margin:0;">

              <h3>${escapeHtml(row.farmerName)}</h3>

            <li><span>문자상태</span><b>${escapeHtml(row.smsStatus)}</b></li>
            <li><span>송금상태</span><b>${escapeHtml(row.paymentStatus || "송금대기")}</b></li>

            </label>
            ${unpaid ? `<button class="primary-button" type="button" onclick="markPaymentDone('${row.id}')">송금 완료로 표시</button>` : `<button class="ghost-button" type="button" onclick="markPaymentPending('${row.id}')">송금완료 취소</button>`}
          </div>
        </div>
      `;
    }

    function setPaymentFilter(key, value) {
      paymentFilters[key] = value;
      selectedPaymentIds.clear();
      renderPayment();
    }

    function showUnpaidPayments() {
      paymentFilters.status = "미송금";
      selectedPaymentIds.clear();
      renderPayment();
    }

    function togglePaymentSelection(id, checked) {
      if (checked) selectedPaymentIds.add(id);
      else selectedPaymentIds.delete(id);
      renderPayment();
    }

    function markPaymentDone(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row || !isPaymentBaseEligible(row)) {
        toast("송금 완료로 표시할 수 없는 확인서입니다.");
        return;
      }
      row.paymentStatus = "송금완료";
      row.paymentCompletedAt = nowLocal();
      row.updatedAt = nowLocal();
      selectedPaymentIds.delete(id);
      saveDb();
      renderAll();
      toast("송금완료로 표시했습니다.");
    }

    function markPaymentPending(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row) return;
      if (!confirm(`${row.farmerName} ${row.no} 송금완료 표시를 취소할까요?`)) return;
      row.paymentStatus = "송금대기";
      row.paymentCompletedAt = "";
      row.updatedAt = nowLocal();
      saveDb();
      renderAll();
      toast("송금완료 표시를 취소했습니다.");
    }

    function markSelectedPaymentsDone() {
      const rows = paymentVisibleRows().filter((row) => selectedPaymentIds.has(row.id) && row.paymentStatus !== "송금완료");
      if (!rows.length) {
        toast("선택된 미송금 대상이 없습니다.");
        return;
      }
      if (!confirm(`선택된 ${rows.length}건을 송금완료로 표시할까요? 실제 은행 송금은 실행되지 않습니다.`)) return;
      rows.forEach((row) => {
        row.paymentStatus = "송금완료";
        row.paymentCompletedAt = nowLocal();
        row.updatedAt = nowLocal();
        selectedPaymentIds.delete(row.id);
      });
      saveDb();
      renderAll();
      toast("선택 항목을 송금완료로 표시했습니다.");
    }

    function markFilteredPaymentsDone() {
      const rows = paymentVisibleRows().filter((row) => row.paymentStatus !== "송금완료");
      if (!rows.length) {
        toast("현재 필터의 미송금 대상이 없습니다.");
        return;
      }
      if (!confirm(`현재 필터의 미송금 대상 ${rows.length}건을 모두 송금완료로 표시할까요? 실제 은행 송금은 실행되지 않습니다.`)) return;
      rows.forEach((row) => {
        row.paymentStatus = "송금완료";
        row.paymentCompletedAt = nowLocal();
        row.updatedAt = nowLocal();
        selectedPaymentIds.delete(row.id);
      });
      saveDb();
      renderAll();
      toast("현재 필터의 미송금 대상을 송금완료로 표시했습니다.");
    }

    function renderPayment() {
      const options = paymentFilterOptions();
      const rows = paymentVisibleRows();
      const summary = paymentDashboard(rows);
      const unpaidCount = rows.filter((row) => row.paymentStatus !== "송금완료").length;
      const selectedCount = rows.filter((row) => selectedPaymentIds.has(row.id) && row.paymentStatus !== "송금완료").length;
      const excluded = paymentExclusions();
      const itemRows = paymentAggregateRows(rows, (confirmation, line) => line.item || "품목 미입력");
      const containerRows = paymentAggregateRows(rows, (confirmation, line) => containerDisplay(line));
      const farmerRows = paymentAggregateRows(rows, (confirmation) => confirmation.farmerName || "농가명 미입력");
      document.getElementById("screen-payment").innerHTML = `
        <div class="section-head">
          <div>
            <h1>송금</h1>
            <p class="muted">실제 은행 송금이 아니라 localStorage 검토용으로 송금 완료 상태만 표시합니다.</p>

            </div>
            <div class="field">

              <select id="paymentItemFilter" onchange="setPaymentFilter('item', this.value)">
                <option value="">전체</option>
                ${options.items.map((item) => `<option value="${escapeHtml(item)}" ${paymentFilters.item === item ? "selected" : ""}>${escapeHtml(item)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="paymentContainerFilter">무게/용기</label>
              <select id="paymentContainerFilter" onchange="setPaymentFilter('container', this.value)">
                <option value="">전체</option>
                ${options.containers.map((container) => `<option value="${escapeHtml(container)}" ${paymentFilters.container === container ? "selected" : ""}>${escapeHtml(container)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="paymentFarmerFilter">농가</label>
              <select id="paymentFarmerFilter" onchange="setPaymentFilter('farmer', this.value)">
                <option value="">전체</option>
                ${options.farmers.map((farmer) => `<option value="${escapeHtml(farmer)}" ${paymentFilters.farmer === farmer ? "selected" : ""}>${escapeHtml(farmer)}</option>`).join("")}
              </select>

              <select id="paymentStatusFilter" onchange="setPaymentFilter('status', this.value)">
                ${["전체", "미송금", "송금완료"].map((status) => `<option value="${status}" ${paymentFilters.status === status ? "selected" : ""}>${status}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="button-row">
            <button class="secondary-button" type="button" onclick="showUnpaidPayments()">미송금만 보기</button>
            <button class="ghost-button" type="button" onclick="markSelectedPaymentsDone()" ${selectedCount ? "" : "disabled"}>선택 ${selectedCount}건 송금완료로 표시</button>
            <button class="ghost-button" type="button" onclick="markFilteredPaymentsDone()" ${unpaidCount ? "" : "disabled"}>현재 필터 미송금 전체 송금완료로 표시</button>
          </div>
        </div>
        <div class="stats-grid">
          <div class="panel"><span class="muted">송금 대상 인원 수</span><h2>${summary.targetPeople}명</h2></div>
          <div class="panel"><span class="muted">미송금 인원 수</span><h2>${summary.unpaidPeople}명</h2></div>
          <div class="panel"><span class="muted">송금완료 인원 수</span><h2>${summary.donePeople}명</h2></div>
          <div class="panel"><span class="muted">미송금 금액 합계</span><h2>${money(summary.unpaidTotal)}</h2></div>
          <div class="panel"><span class="muted">송금완료 금액 합계</span><h2>${money(summary.doneTotal)}</h2></div>
          <div class="panel"><span class="muted">전체 송금 대상 금액</span><h2>${money(summary.grandTotal)}</h2></div>
        </div>
        <div class="panel">

          ${rows.length ? `<div class="line-list">${rows.map(renderPaymentCard).join("")}</div>` : "<div class='empty'>현재 필터의 송금 대상이 없습니다.</div>"}
        </div>
        ${renderPaymentAggregateTable("과일/품목별 송금 대상 금액", itemRows, "과일/품목")}

        ${renderPaymentAggregateTable("농가별 송금 대상 금액", farmerRows, "농가명")}
        ${renderPaymentExclusionPanel("문자 미전송 제외", excluded.unsent, "문자대기 또는 문자앱열림 상태는 송금 대상에서 제외합니다.")}

        ${renderPaymentExclusionPanel("단가미정 제외", excluded.pendingPrice, "단가미정 또는 금액 계산 불가 확인서는 송금 대상에서 제외합니다.")}
        ${renderPaymentExclusionPanel("계좌정보 누락 제외", excluded.missingAccount, "은행명, 계좌번호, 예금주가 모두 있어야 송금 대상으로 표시합니다.")}
      `;
    }

    function downloadPaymentCsv() {
      const rows = paymentVisibleRows();
      if (!rows.length) {
        toast("CSV로 내보낼 송금 대상이 없습니다.");
        return;
      }
      const header = ["입고일자", "농가명", "전화번호", "은행명", "계좌번호", "예금주", "과일/품목 요약", "무게/용기 요약", "총 수량", "송금 대상 금액", "송금상태"];
      const body = rows.map((row) => [
        confirmationDate(row),
        row.farmerName,
        row.phone || phoneDisplay(row),
        row.bankName,
        row.accountNo,
        row.accountHolder,
        itemSummary(row),
        containerSummary(row),
        totalQuantity(row.lines),
        totalAmount(row.lines),
        row.paymentStatus || "송금대기"
      ].map(csvEscape).join(","));
      const blob = new Blob(["\ufeff" + [header.join(","), ...body].join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `confirm-payment-${paymentFilters.dateFrom || "from"}-${paymentFilters.dateTo || "to"}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("송금 대상 CSV를 생성했습니다. 실제 은행 이체파일 규격은 아닙니다.");
    }

    function downloadSettlementCsv() {
      const rows = farmerAggregateRows(payableConfirmationRows(confirmationsByDate(dailyDateFilter)));
      if (!rows.length) {
        toast("CSV로 내보낼 전송완료 확인서가 없습니다.");
        return;
      }
      const header = ["농가명", "전화번호", "계좌정보", "확인서수", "총수량", "정산반영가능금액", "단가미정건수", "확인서NO", "메모"];
      const body = rows.map((row) => [row.key, row.phone, row.account, row.confirmationCount, row.count, row.total, row.pending, row.nos.join(" "), "일자별 현황 CSV 예시"].map(csvEscape).join(","));
      const blob = new Blob(["\ufeff" + [header.join(","), ...body].join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `confirm-daily-status-${dailyDateFilter}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("일자별 현황 CSV 예시를 생성했습니다.");
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function toast(message) {
      const node = document.getElementById("toast");
      node.textContent = message;
      node.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => node.classList.remove("show"), 2200);
    }

    renderAll();
  </script>
</body>
