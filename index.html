<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#166534">
  <title>전자 입고확인서 MVP</title>
  <style>
    :root {
      --bg: #f5f7f1;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #637381;
      --line: #d7ded2;
      --primary: #166534;
      --primary-dark: #14532d;
      --accent: #b45309;
      --danger: #b91c1c;
      --blue: #1d4ed8;
      --shadow: 0 12px 28px rgba(22, 32, 42, 0.10);
      --radius: 8px;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 18px;
      line-height: 1.45;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(18, 32, 43, 0.07);
    }

    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 16px 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand strong { display: block; font-size: 22px; }
    .brand span { color: var(--muted); font-size: 14px; }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .nav button, .quick-button, .primary-button, .secondary-button, .ghost-button, .danger-button, .option-card, .qty-button {
      border-radius: var(--radius);
      min-height: 50px;
      border: 0;
      font-weight: 800;
    }

    .nav button {
      background: #edf1ed;
      color: #263238;
      padding: 12px 8px;
      font-size: 15px;
    }

    .nav button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 7px 18px rgba(22, 101, 52, 0.22);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 16px 36px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 16px;
    }

    h1, h2, h3 { margin: 0; line-height: 1.2; letter-spacing: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 24px; }
    h3 { font-size: 20px; }

    .muted { color: var(--muted); font-size: 15px; }

    .home-actions, .stats-grid, .line-list { display: grid; gap: 12px; }

    .quick-button {
      width: 100%;
      min-height: 86px;
      padding: 16px;
      background: var(--surface);
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }

    .quick-button strong { display: block; font-size: 22px; margin-bottom: 4px; }
    .quick-button .count {
      min-width: 52px;
      min-height: 52px;
      border-radius: 50%;
      background: #fff7ed;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
    }

    .panel, .confirm-card, .line-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 22px rgba(18, 32, 43, 0.07);
      margin-bottom: 14px;
    }

    .field { display: grid; gap: 8px; margin-bottom: 14px; }
    label { font-weight: 800; }

    input, select, textarea {
      width: 100%;
      min-height: 54px;
      border-radius: var(--radius);
      border: 2px solid var(--line);
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
    }

    textarea { min-height: 180px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(22, 101, 52, 0.18);
      border-color: var(--primary);
    }

    .option-grid, .qty-control {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .favorite-grid, .chart-list {
      display: grid;
      gap: 10px;
    }

    .chart-row {
      display: grid;
      gap: 6px;
    }

    .chart-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 800;
    }

    .chart-track {
      width: 100%;
      height: 18px;
      background: #edf1ed;
      border-radius: 999px;
      overflow: hidden;
    }

    .chart-bar {
      min-width: 4px;
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
    }

    .option-card {
      width: 100%;
      min-height: 78px;
      padding: 12px;
      background: #fff;
      border: 2px solid var(--line);
      text-align: left;
      color: var(--ink);
    }

    .option-card strong { display: block; font-size: 20px; margin-bottom: 4px; }
    .option-card.selected {
      border-color: var(--primary);
      background: #ecfdf3;
      box-shadow: 0 8px 18px rgba(22, 101, 52, 0.16);
    }

    .qty-control { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .qty-button {
      min-height: 58px;
      background: #fff7ed;
      color: #7c2d12;
      border: 2px solid #fed7aa;
      font-weight: 900;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .primary-button, .secondary-button, .ghost-button, .danger-button {
      min-height: 54px;
      padding: 12px 16px;
      font-weight: 900;
    }

    .primary-button { background: var(--primary); color: #fff; }
    .secondary-button { background: #25323a; color: #fff; }
    .ghost-button { background: #edf1ed; color: #263238; border: 1px solid var(--line); }
    .danger-button { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .money-box {
      display: grid;
      gap: 8px;
      background: #f7fbf8;
      border: 1px solid #cfe3d8;
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 12px;
    }

    .money-box b { font-size: 28px; }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7eef8;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.waiting { background: #fff7ed; color: #9a3412; }
    .badge.done { background: #eaf7ed; color: var(--primary); }
    .badge.pending-price { background: #fee2e2; color: var(--danger); }

    .summary-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .summary-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #edf1ed;
      padding: 8px 0;
    }

    .confirm-preview {
      border: 3px solid var(--primary);
      background: #fff;
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .preview-no { font-size: 16px; color: var(--muted); font-weight: 800; }
    .preview-title { font-size: 30px; font-weight: 900; margin: 8px 0 14px; }

    .recipient-box {
      display: grid;
      gap: 6px;
      margin: 12px 0;
      padding: 16px;
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      background: #ecfdf3;
    }

    .recipient-box b {
      font-size: 30px;
      letter-spacing: 0;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-top: 12px;
    }

    table { border-collapse: collapse; width: 100%; min-width: 760px; font-size: 16px; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px; text-align: left; vertical-align: top; }
    th { background: #edf1ed; font-size: 14px; color: #34444d; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .filter-row .field { min-width: 220px; margin-bottom: 0; flex: 1; }
    .warning-panel { border-color: #fecaca; background: #fff7f7; }
    .status-split { display: grid; gap: 12px; }

    .empty {
      padding: 20px;
      border: 1px dashed #b9c4bd;
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      background: #17202a;
      color: #fff;
      padding: 14px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: none;
      font-weight: 800;
    }

    .toast.show { display: block; }

    @media (min-width: 760px) {
      .home-actions, .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .option-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .status-split { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (min-width: 1020px) {
      .home-actions { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .quick-button { min-height: 132px; align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand">
            <strong>전자 입고확인서</strong>
            <span id="todayLabel">입고확인서 작성 · 입고 내역 · 현황 · 송금 프로토타입</span>
          </div>
          <div class="top-actions">
            <button class="ghost-button" type="button" onclick="showScreen('price')">단가 관리</button>
            <button class="ghost-button" type="button" onclick="resetSample()">샘플 초기화</button>
          </div>
        </div>
        <nav class="nav" aria-label="주요 화면">
          <button type="button" data-nav="home" class="active" onclick="showScreen('home')">홈</button>
          <button type="button" data-nav="send" onclick="startNew()">입고확인서 작성</button>
          <button type="button" data-nav="today" onclick="showScreen('today')">입고 확인 내역</button>
          <button type="button" data-nav="settlement" onclick="showScreen('settlement')">일자별 현황</button>
          <button type="button" data-nav="payment" onclick="showScreen('payment')">송금</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="screen-home" class="screen active"></section>
      <section id="screen-form" class="screen"></section>
      <section id="screen-preview" class="screen"></section>
      <section id="screen-price" class="screen"></section>
      <section id="screen-today" class="screen"></section>
      <section id="screen-send" class="screen"></section>
      <section id="screen-settlement" class="screen"></section>
      <section id="screen-payment" class="screen"></section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "haebaramConfirmAppV1";
    const PRICE_STORAGE_KEY = "haebaramConfirmPriceRules";
    const FAVORITE_STORAGE_KEY = "haebaramConfirmFavorites";
    const SMS_STATUS = ["문자대기", "문자앱열림", "전송완료", "재전송필요"];
    const PAYMENT_STATUS = ["송금대기", "송금완료"];
    const WORK_STATUS = ["작업완료", "작업후정산예정"];
    const LEGACY_STATUS = ["문자대기", "문자앱열림", "전송완료표시", "재전송필요", "정산대기", "정산확정", "입금완료"];
    const ITEMS = ["사과", "배", "복숭아", "포도", "감귤"];
    const GRADES = ["A", "B", "C", "소"];
    const DEFAULT_ITEM = "배";
    const DEFAULT_GRADE = "A";
    const CONTAINERS = [
      { label: "20kg 상자", type: "상자", size: "20kg", kg: 20 },
      { label: "기타", type: "기타", size: "", kg: null }
    ];

    let priceRules = loadPriceRules();
    let priceDraft = freshPriceDraft();
    let favorites = loadFavorites();
    let favoritePanelOpen = false;
    let favoriteNameDraft = "";
    let db = loadDb();
    let currentScreen = "home";
    let draft = freshDraft();
    let selectedConfirmationId = "";
    let resendPhone = "";
    let receiptDateFilter = localDateISO();
    let dailyDateFilter = localDateISO();
    let paymentFilters = {
      dateFrom: localDateISO(),
      dateTo: localDateISO(),
      item: "",
      container: "",
      farmer: "",
      status: "미송금"
    };
    let selectedPaymentIds = new Set();

    function localDateISO(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function nowLocal() {
      const date = new Date();
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${localDateISO(date)}T${hour}:${minute}`;
    }

    function defaultLineInput() {
      return { item: DEFAULT_ITEM, grade: DEFAULT_GRADE, containerType: "상자", containerSize: "20kg", customKg: 20, count: 1 };
    }

    function emptyGradeCounts() {
      return GRADES.reduce((counts, grade) => ({ ...counts, [grade]: "" }), {});
    }

    function makeId(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
    }

    function money(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function number(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function digitsOnly(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function last4(value) {
      const digits = digitsOnly(value);
      return digits.slice(-4);
    }

    function emptyGradePrices() {
      return GRADES.reduce((prices, grade) => ({ ...prices, [grade]: null }), {});
    }

    function normalizeGradePrices(raw = {}) {
      return GRADES.reduce((prices, grade) => {
        const value = raw?.[grade];
        const numberValue = value === "" || value === null || value === undefined ? null : Number(value);
        prices[grade] = Number.isFinite(numberValue) && numberValue > 0 ? Math.round(numberValue) : null;
        return prices;
      }, {});
    }

    function hasAnyGradePrice(prices) {
      return GRADES.some((grade) => Number.isFinite(Number(prices?.[grade])) && Number(prices[grade]) > 0);
    }

    function normalizePriceRules(raw = {}) {
      const result = { items: [], legacyGradePrices: emptyGradePrices() };
      const seen = new Set();
      const addItem = (itemName, gradePrices) => {
        const name = String(itemName || "").trim();
        if (!name || seen.has(name)) return;
        seen.add(name);
        result.items.push({ itemName: name, gradePrices: normalizeGradePrices(gradePrices) });
      };

      if (Array.isArray(raw)) {
        raw.forEach((row) => addItem(row?.itemName || row?.fruitName, row?.gradePrices || row));
      } else if (Array.isArray(raw?.items)) {
        raw.items.forEach((row) => addItem(row?.itemName || row?.fruitName, row?.gradePrices || row));
        result.legacyGradePrices = normalizeGradePrices(raw.legacyGradePrices || {});
      } else if (raw && typeof raw === "object") {
        const isLegacyGradeOnly = GRADES.some((grade) => Object.prototype.hasOwnProperty.call(raw, grade));
        if (isLegacyGradeOnly) {
          result.legacyGradePrices = normalizeGradePrices(raw);
        } else {
          Object.entries(raw).forEach(([itemName, value]) => addItem(itemName, value?.gradePrices || value));
        }
      }

      result.items.sort((a, b) => a.itemName.localeCompare(b.itemName, "ko-KR"));
      return result;
    }

    function loadPriceRules() {
      try {
        const stored = localStorage.getItem(PRICE_STORAGE_KEY);
        return stored ? normalizePriceRules(JSON.parse(stored)) : createSeedPriceRules();
      } catch (error) {
        console.warn("confirm app price rule parse failed", error);
        return normalizePriceRules();
      }
    }

    function savePriceRules() {
      priceRules = normalizePriceRules(priceRules);
      localStorage.setItem(PRICE_STORAGE_KEY, JSON.stringify(priceRules));
    }

    function createSeedPriceRules() {
      return normalizePriceRules({
        items: [
          { itemName: "사과", gradePrices: { A: 80000, B: 60000, C: 42000, "소": 30000 } },
          { itemName: "배", gradePrices: { A: 90000, B: 65000, C: 45000, "소": null } },
          { itemName: "복숭아", gradePrices: { A: 70000, B: 56000, C: 38000, "소": 25000 } }
        ]
      });
    }

    function freshPriceDraft() {
      return { itemName: "", gradePrices: emptyGradePrices() };
    }

    function priceValueLabel(value) {
      return Number.isFinite(Number(value)) && Number(value) > 0 ? String(Math.round(Number(value))) : "";
    }

    function draftPriceInputValue(grade) {
      return priceValueLabel(priceDraft.gradePrices[grade]);
    }

    function rowPriceInputValue(index, grade) {
      return priceValueLabel(priceRules.items[index]?.gradePrices?.[grade]);
    }

    function parseKgValue(value) {
      const numberValue = Number(String(value || "").replace(/[^\d.]/g, ""));
      return Number.isFinite(numberValue) && numberValue > 0 ? numberValue : 0;
    }

    function normalizeStatusFields(row) {
      const legacyStatus = row?.status || row?.smsStatus || "문자대기";
      let smsStatus = SMS_STATUS.includes(row?.smsStatus) ? row.smsStatus : "";
      let paymentStatus = PAYMENT_STATUS.includes(row?.paymentStatus) ? row.paymentStatus : "송금대기";

      if (!smsStatus) {
        if (["전송완료표시", "정산대기", "정산확정", "입금완료"].includes(legacyStatus)) smsStatus = "전송완료";
        else if (SMS_STATUS.includes(legacyStatus)) smsStatus = legacyStatus;
        else smsStatus = "문자대기";
      }

      if (legacyStatus === "입금완료") paymentStatus = "송금완료";
      return { smsStatus, paymentStatus, legacyStatus };
    }

    function normalizeWorkStatus(row) {
      if (WORK_STATUS.includes(row?.workStatus)) return row.workStatus;
      if (row?.isWorkCompleted === false || row?.workPending === true) return "작업후정산예정";
      return "작업완료";
    }

    function isWorkCompleted(source) {
      return normalizeWorkStatus(source) === "작업완료";
    }

    function isWorkPending(source) {
      return !isWorkCompleted(source);
    }

    function workStatusLabel(source) {
      return normalizeWorkStatus(source);
    }

    function lineIsWorkPending(line) {
      return normalizeWorkStatus(line) === "작업후정산예정" || Boolean(line?.workPending);
    }

    function normalizeLine(line) {
      const count = Number(line?.count || 0);
      const workStatus = normalizeWorkStatus(line);
      const workPending = workStatus === "작업후정산예정";
      const unitPrice = line?.unitPrice === null || line?.unitPrice === undefined ? null : Number(line.unitPrice);
      const customKg = line?.customKg === null || line?.customKg === undefined ? parseKgValue(line?.containerSize) : parseKgValue(line.customKg);
      const pricePending = workPending ? false : Boolean(line?.pricePending || unitPrice === null || line?.amount === null);
      return {
        id: line?.id || makeId("line"),
        item: line?.item || "",
        grade: line?.grade || "",
        containerType: line?.containerType || "",
        containerSize: line?.containerSize || "",
        customKg,
        baseUnitKg: Number(line?.baseUnitKg || 20),
        baseUnitPrice: workPending ? null : (line?.baseUnitPrice === null || line?.baseUnitPrice === undefined ? unitPrice : Number(line.baseUnitPrice)),
        count,
        unitPrice: workPending ? null : unitPrice,
        amount: workPending || pricePending ? null : Number(line?.amount ?? count * unitPrice),
        pricePending,
        workStatus,
        workPending
      };
    }

    function loadDb() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createSeedDb();
      try {
        const parsed = JSON.parse(raw);
        return { confirmations: (parsed.confirmations || []).map(normalizeConfirmation) };
      } catch (error) {
        console.warn("confirm app storage parse failed", error);
        return createSeedDb();
      }
    }

    function normalizeConfirmation(row) {
      const { smsStatus, paymentStatus } = normalizeStatusFields(row);
      const workStatus = normalizeWorkStatus(row);
      const receivedAt = row?.receivedAt || row?.createdAt || nowLocal();
      const phone = row?.phone || "";
      return {
        id: row?.id || makeId("confirm"),
        no: row?.no || `EC-${localDateISO().replaceAll("-", "")}-LEGACY`,
        farmerName: row?.farmerName || "농가명 미입력",
        phone,
        phoneLast4: row?.phoneLast4 || last4(phone),
        bankName: row?.bankName || "",
        accountNo: row?.accountNo || "",
        accountHolder: row?.accountHolder || row?.farmerName || "",
        receivedAt,
        receivedDate: row?.receivedDate || receivedAt.slice(0, 10) || localDateISO(),
        smsStatus,
        paymentStatus,
        paymentCompletedAt: row?.paymentCompletedAt || "",

    function findPrice(item, grade) {
      const name = String(item || "").trim();
      const row = priceRules.items.find((rule) => rule.itemName === name);
      const itemPrice = row?.gradePrices?.[grade];
      if (Number.isFinite(Number(itemPrice)) && Number(itemPrice) > 0) return Number(itemPrice);
      const legacyPrice = priceRules.legacyGradePrices?.[grade];
      return Number.isFinite(Number(legacyPrice)) && Number(legacyPrice) > 0 ? Number(legacyPrice) : null;
    }

    function lineKg(containerType, containerSize, customKg) {
      if (containerType === "상자" && containerSize === "20kg") return 20;
      if (containerType === "기타") return parseKgValue(customKg || containerSize);
      return parseKgValue(customKg || containerSize);
    }

    function makeLine(item, grade, containerType, containerSize, count, customKg = 0, workStatus = "작업완료") {
      const lineWorkStatus = normalizeWorkStatus({ workStatus });
      const workPending = lineWorkStatus === "작업후정산예정";
      const unitPrice = findPrice(item, grade);
      const kg = lineKg(containerType, containerSize, customKg);
      const hasCalculableKg = containerType !== "기타" || kg > 0;
      const amount = workPending || unitPrice === null || !hasCalculableKg ? null : Math.round(unitPrice * (kg / 20) * Number(count || 0));
      return {
        id: makeId("line"),
        item,
        grade,
        containerType,
        containerSize: containerType === "기타" ? (kg > 0 ? `${kg}kg` : "kg 미입력") : containerSize,
        customKg: kg,
        baseUnitKg: 20,
        baseUnitPrice: workPending ? null : unitPrice,
        count: Number(count || 0),
        unitPrice: workPending ? null : unitPrice,
        amount,
        pricePending: workPending ? false : amount === null,
        workStatus: lineWorkStatus,
        workPending
      };
    }

    function isPricePending(line) {
      return !lineIsWorkPending(line) && (line.pricePending || line.unitPrice === null || line.amount === null);
    }

    function payableAmount(line) {
      return lineIsWorkPending(line) || isPricePending(line) ? 0 : Number(line.amount || 0);
    }

    function totalAmount(lines) {
      return lines.reduce((sum, line) => sum + payableAmount(line), 0);
    }

    function pendingCount(lines) {
      return lines.filter(isPricePending).length;
    }

    function amountLabel(line) {
      if (lineIsWorkPending(line)) return "작업 후 정산 예정";
      return isPricePending(line) ? "단가 미정 / 정산 확인 필요" : money(line.amount);
    }

    function priceLabel(line) {
      if (lineIsWorkPending(line)) return "금액 미확정";
      return isPricePending(line) ? "단가 미정" : money(line.unitPrice);
    }

    function receiptAmountLabel(source) {
      return isWorkPending(source) ? "작업 후 정산 예정 / 금액 미확정" : money(totalAmount(source.lines || []));
    }

    function receiptPendingPriceLabel(source) {
      return isWorkPending(source) ? "-" : `${pendingCount(source.lines || [])}건`;
    }

    function recalcLineForWorkStatus(line, workStatus) {
      const next = makeLine(line.item, line.grade, line.containerType, line.containerSize, line.count, line.customKg, workStatus);
      next.id = line.id || next.id;
      return next;
    }

    function containerDisplay(line) {
      if (line.containerType === "기타") return `기타 ${line.customKg > 0 ? line.customKg + "kg" : "kg 미입력"}`;
      if (line.containerType === "상자" && line.containerSize === "20kg") return "20kg 상자";
      return `${line.containerType || "용기"} ${line.containerSize || ""}`.trim();
    }

    function todayConfirmations() {
      return confirmationsByDate(localDateISO());
    }

    function confirmationDate(confirmation) {
      return confirmation.receivedDate || (confirmation.receivedAt || "").slice(0, 10) || localDateISO();
    }

    function confirmationsByDate(date) {
      return db.confirmations.filter((confirmation) => confirmationDate(confirmation) === date);
    }

    function sendWaitingRows() {
      return db.confirmations.filter((row) => ["문자대기", "문자앱열림", "재전송필요"].includes(row.smsStatus));
    }

    function statusForBadge(status) {
      if (status === "재전송필요") return "pending-price";
      if (status === "전송완료" || status === "송금완료") return "done";
      return "waiting";
    }

    function sentLikeStatus(status) {
      return ["전송완료", "전송완료표시", "정산대기", "정산확정", "입금완료"].includes(status);
    }

    function payableConfirmationRows(rows) {
      return rows.filter((row) => row.smsStatus === "전송완료" && isWorkCompleted(row));
    }

    function hasPaymentAccount(row) {
      return Boolean((row.bankName || "").trim() && (row.accountNo || "").trim() && (row.accountHolder || "").trim());
    }

    function hasPositivePayableAmount(row) {
      return isWorkCompleted(row) && totalAmount(row.lines || []) > 0 && pendingCount(row.lines || []) === 0;
    }

    function isPaymentBaseEligible(row) {
      return row.smsStatus === "전송완료" && isWorkCompleted(row) && hasPositivePayableAmount(row) && hasPaymentAccount(row);
    }

    function isPaymentLocked(row) {
      return (row?.paymentStatus || "송금대기") === "송금완료";
    }

    function paymentLockedMessage(row) {
      return `이미 송금완료된 건입니다.\n\n품목/수량/단가/계좌를 수정하면 실제 송금 내역과 앱 기록이 달라질 수 있습니다.\n수정이 꼭 필요하면 송금완료를 해제한 뒤 수정하세요.\n\n입고번호: ${row?.no || ""}`;
    }

    function warnPaymentLocked(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row) return;
      alert(paymentLockedMessage(row));
      toast("송금완료 해제 후 수정할 수 있습니다.");
    }

    function itemSummary(row) {
      const items = [...new Set((row.lines || []).map((line) => line.item).filter(Boolean))];
      return items.join(", ") || "품목 없음";
    }

    function containerSummary(row) {
      const containers = [...new Set((row.lines || []).map(containerDisplay))];
      return containers.join(", ") || "용기 없음";
    }

    function totalQuantity(lines) {
      return (lines || []).reduce((sum, line) => sum + Number(line.count || 0), 0);
    }

    function lineSignature(lines) {
      return JSON.stringify((lines || []).map((line) => ({
        item: line.item,
        grade: line.grade,
        containerType: line.containerType,
        containerSize: line.containerSize,
        customKg: Number(line.customKg || 0),
        baseUnitKg: Number(line.baseUnitKg || 20),
        baseUnitPrice: line.baseUnitPrice,
        count: Number(line.count || 0),
        unitPrice: line.unitPrice,
        amount: line.amount,
        pricePending: Boolean(line.pricePending),
        workStatus: normalizeWorkStatus(line),
        workPending: lineIsWorkPending(line)
      })));
    }

    function draftNeedsResend() {
      const workStatusChanged = normalizeWorkStatus(draft) !== (draft.originalWorkStatus || "작업완료");
      return Boolean(draft.id && sentLikeStatus(draft.originalSmsStatus || draft.originalStatus) && (lineSignature(draft.lines) !== draft.originalLineSignature || workStatusChanged));
    }

    function isRevisionMessage(source) {
      return Boolean(source.isRevision || source.smsStatus === "재전송필요" || source.status === "재전송필요");
    }

    function isSettlementFinalMessage(source) {
      return Boolean(source.wasWorkPendingBeforeRevision && isWorkCompleted(source));

                      ${GRADES.map((grade) => `<td><input type="number" min="0" inputmode="numeric" value="${escapeHtml(rowPriceInputValue(index, grade))}" oninput="setPriceRowValue(${index}, '${grade}', this.value)" aria-label="${grade} 단가"></td>`).join("")}
                      <td>
                        <div class="button-row">
                          <button class="ghost-button" type="button" onclick="savePriceRulesAndRender()">수정 저장</button>
                          <button class="danger-button" type="button" onclick="deletePriceRule(${index})">삭제</button>
                        </div>
                      </td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          ` : "<div class='empty'>저장된 과일/품목별 단가가 없습니다.</div>"}
        </div>
      `;
    }

    function savePriceRulesAndRender() {
      savePriceRules();
      renderAll();
      showScreen("price");
      toast("20kg 기준 단가를 저장했습니다.");
    }

    function savePriceItemFromDraft() {
      const itemName = String(priceDraft.itemName || "").trim();
      if (!itemName) {
        toast("과일/품목명을 입력하세요.");
        return;
      }
      const existing = priceRules.items.findIndex((row) => row.itemName === itemName);
      const nextRow = { itemName, gradePrices: normalizeGradePrices(priceDraft.gradePrices) };
      if (existing >= 0) priceRules.items[existing] = nextRow;
      else priceRules.items.push(nextRow);
      priceDraft = freshPriceDraft();
      savePriceRulesAndRender();
    }

    function setPriceRowItemName(index, value) {
      if (!priceRules.items[index]) return;
      priceRules.items[index].itemName = value;
    }

    function setPriceRowValue(index, grade, value) {
      if (!priceRules.items[index]) return;
      priceRules.items[index].gradePrices[grade] = value;
    }

    function deletePriceRule(index) {
      const row = priceRules.items[index];
      if (!row) return;
      if (!confirm(`${row.itemName} 단가를 삭제할까요?`)) return;
      priceRules.items.splice(index, 1);
      savePriceRulesAndRender();
    }

    function historyRows() {
      return [...db.confirmations].sort((a, b) => {
        const aTime = a.updatedAt || a.createdAt || a.receivedAt || "";
        const bTime = b.updatedAt || b.createdAt || b.receivedAt || "";
        return bTime.localeCompare(aTime);
      });
    }

    function uniqueHistoryOptions(key) {
      const seen = new Set();
      return historyRows().map((row) => key === "phone" ? row.phone : row[key]).filter((value) => {
        const text = String(value || "").trim();
        if (!text || seen.has(text)) return false;
        seen.add(text);
        return true;
      });
    }

    function findHistoryMatch(key, value) {
      const text = String(value || "").trim();
      if (!text) return null;
      return historyRows().find((row) => {
        if (key === "phone") return digitsOnly(row.phone) === digitsOnly(text);
        return String(row[key] || "").trim() === text;
      }) || null;
    }

    function applyHistoryMatch(match, source) {
      if (!match) return false;
      if (source !== "farmerName") draft.farmerName = match.farmerName || draft.farmerName;
      if (source !== "phone") draft.phone = match.phone || draft.phone;
      if (source !== "accountNo") draft.accountNo = match.accountNo || draft.accountNo;
      draft.bankName = match.bankName || draft.bankName;
      draft.accountHolder = match.accountHolder || draft.accountHolder;
      draft.autoFillNotice = "과거 이력에서 전화번호와 계좌정보를 불러왔습니다.";
      renderForm();
      return true;
    }

    function handleHistoryInput(key, value) {
      draft[key] = value;
      const match = findHistoryMatch(key, value);
      if (match) applyHistoryMatch(match, key);
    }

    function normalizeFavoriteLine(line = {}) {
      const containerType = line.containerType === "기타" ? "기타" : "상자";
      const customKg = containerType === "기타" ? parseKgValue(line.customKg || line.containerSize) : 20;
      return {
        item: line.item || "",
        grade: line.grade || "",
        containerType,
        containerSize: containerType === "기타" ? "" : "20kg",
        customKg,
        count: Math.max(1, Number(line.count || 1))
      };
    }

    function normalizeFavorite(row = {}) {
      const type = row.type === "line" ? "line" : "full";
      const lines = (Array.isArray(row.lines) ? row.lines : row.line ? [row.line] : []).map(normalizeFavoriteLine);
      return {
        id: row.id || makeId("favorite"),
        type,
        name: String(row.name || "").trim(),
        farmerName: type === "full" ? String(row.farmerName || "").trim() : "",
        phone: type === "full" ? String(row.phone || "").trim() : "",
        bankName: type === "full" ? String(row.bankName || "").trim() : "",
        accountNo: type === "full" ? String(row.accountNo || "").trim() : "",
        accountHolder: type === "full" ? String(row.accountHolder || "").trim() : "",
        lines,
        createdAt: row.createdAt || nowLocal(),
        updatedAt: row.updatedAt || nowLocal()
      };
    }

    function loadFavorites() {
      try {
        const parsed = JSON.parse(localStorage.getItem(FAVORITE_STORAGE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed.map(normalizeFavorite).filter((favorite) => favorite.lines.length) : [];
      } catch (error) {
        console.warn("confirm app favorite parse failed", error);
        return [];
      }
    }

    function saveFavorites() {
      favorites = favorites.map(normalizeFavorite).filter((favorite) => favorite.lines.length);
      localStorage.setItem(FAVORITE_STORAGE_KEY, JSON.stringify(favorites));
    }

    function favoriteContainerLabel(line) {
      return line.containerType === "기타" ? `기타 ${line.customKg > 0 ? line.customKg + "kg" : "kg 미입력"}` : "20kg 상자";
    }

    function favoriteAutoName(type, lines) {
      if (type === "full") {
        const lineText = lines.length ? `${lines[0].item || "상세줄"} ${lines[0].grade || ""}`.trim() : "상세줄";
        return `${draft.farmerName || "농가"} · ${lineText}`;
      }
      const line = lines[0] || {};
      return `${line.item || "품목"} ${line.grade || ""} · ${favoriteContainerLabel(line)}`.trim();
    }

    function currentFavoriteLines() {
      const lines = draft.lines.map(normalizeFavoriteLine);
      if (!lines.length && canAddLine()) lines.push(normalizeFavoriteLine(draft.line));
      return lines;
    }

    function currentLineFavoriteLines() {
      if (draft.lines.length) return draft.lines.map(normalizeFavoriteLine);
      return canAddLine() ? [normalizeFavoriteLine(draft.line)] : [];
    }

    function saveFavorite(type) {
      const normalizedType = type === "line" ? "line" : "full";
      const sourceLines = normalizedType === "line"
        ? currentLineFavoriteLines()
        : currentFavoriteLines();
      if (!sourceLines.length) {
        toast("즐겨찾기에 저장할 상세 줄을 먼저 입력하세요.");
        return;
      }
      if (normalizedType === "full" && !draft.farmerName.trim()) {
        toast("전체 즐겨찾기는 농가명을 입력한 뒤 저장하세요.");
        return;
      }
      const now = nowLocal();
      const favorite = normalizeFavorite({
        id: makeId("favorite"),
        type: normalizedType,
        name: favoriteNameDraft.trim() || favoriteAutoName(normalizedType, sourceLines),
        farmerName: draft.farmerName,
        phone: draft.phone,
        bankName: draft.bankName,
        accountNo: draft.accountNo,
        accountHolder: draft.accountHolder,
        lines: sourceLines,
        createdAt: now,
        updatedAt: now
      });
      favorites.unshift(favorite);
      favoriteNameDraft = "";
      favoritePanelOpen = true;
      saveFavorites();
      renderForm();
      toast(normalizedType === "line" ? "상세줄 즐겨찾기를 저장했습니다." : "전체 즐겨찾기를 저장했습니다.");
    }

    function lineFromFavoriteTemplate(line) {
      const template = normalizeFavoriteLine(line);
      return makeLine(template.item, template.grade, template.containerType, template.containerSize, template.count, template.customKg, draft.workStatus);
    }

    function applySavedFavorite(id) {
      const favorite = favorites.find((row) => row.id === id);
      if (!favorite) return;
      if (favorite.type === "full") {
        draft.farmerName = favorite.farmerName || "";
        draft.phone = favorite.phone || "";
        draft.bankName = favorite.bankName || "";
        draft.accountNo = favorite.accountNo || "";
        draft.accountHolder = favorite.accountHolder || favorite.farmerName || "";
        draft.lines = favorite.lines.map(lineFromFavoriteTemplate);
        clearLine(false);
      } else {
        draft.lines.push(...favorite.lines.map(lineFromFavoriteTemplate));
      }
      draft.autoFillNotice = "즐겨찾기에서 불러왔습니다. 저장 전 수량, 단가, 계좌정보를 확인하세요.";
      favoritePanelOpen = true;
      renderForm();
      toast("즐겨찾기에서 불러왔습니다.");
    }

    function deleteFavorite(id) {
      const favorite = favorites.find((row) => row.id === id);
      if (!favorite) return;
      if (!confirm(`즐겨찾기 '${favorite.name || "이 항목"}'을 삭제할까요?`)) return;
      favorites = favorites.filter((row) => row.id !== id);
      saveFavorites();
      renderForm();
      toast("즐겨찾기를 삭제했습니다.");
    }

    function toggleFavoritePanel() {
      favoritePanelOpen = !favoritePanelOpen;
      renderForm();
    }

    function renderFavoritePanel() {
      if (draft.id) return "";
      return `
        <div class="panel">
          <div class="section-head" style="margin:0;">
            <div>
              <h2>즐겨찾기</h2>
              <p class="muted">자주 쓰는 전체 확인서나 상세줄만 직접 저장해서 불러옵니다.</p>
            </div>
            <button class="secondary-button" type="button" onclick="toggleFavoritePanel()">${favoritePanelOpen ? "닫기" : "열기"}</button>
          </div>
          ${favoritePanelOpen ? `
            <div class="field">
              <label for="favoriteName">즐겨찾기 이름</label>
              <input id="favoriteName" value="${escapeHtml(favoriteNameDraft)}" oninput="favoriteNameDraft = this.value" placeholder="비워두면 자동 이름으로 저장">
            </div>
            <div class="button-row">
              <button class="secondary-button" type="button" onclick="saveFavorite('full')">현재 확인서 전체 저장</button>
              <button class="secondary-button" type="button" onclick="saveFavorite('line')">현재 상세줄만 저장</button>
            </div>
            ${favorites.length ? `
              <div class="favorite-grid">
                ${favorites.map((favorite) => {
                  const line = favorite.lines[0] || {};
                  const title = favorite.name || favoriteAutoName(favorite.type, favorite.lines);
                  return `
                    <div class="option-card">
                      <strong>${escapeHtml(title)}</strong>
                      <span>${favorite.type === "full" ? "전체" : "상세줄"} · ${escapeHtml(favorite.type === "full" ? (favorite.farmerName || "농가명 없음") : `${line.item || "품목 없음"} ${line.grade || ""}`.trim())}</span>
                      <span>${escapeHtml(favoriteContainerLabel(line))} · 기본 ${number(line.count || 1)}개 · ${favorite.lines.length}줄</span>
                      <div class="button-row">
                        <button class="primary-button" type="button" onclick="applySavedFavorite('${favorite.id}')">${favorite.type === "full" ? "전체 불러오기" : "상세줄 추가"}</button>
                        <button class="danger-button" type="button" onclick="deleteFavorite('${favorite.id}')">삭제</button>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            ` : "<div class='empty'>저장된 즐겨찾기가 없습니다. 자주 쓰는 입고 정보나 상세줄을 저장해두면 빠르게 불러올 수 있습니다.</div>"}
          ` : ""}
        </div>
      `;
    }

    function renderForm() {
      const line = draft.line;
      const selectedContainer = line.containerType === "기타"
        ? `기타 ${line.customKg > 0 ? line.customKg + "kg" : "kg 미입력"}`
        : (line.containerType === "상자" && line.containerSize === "20kg" ? "20kg 상자" : (line.containerType && line.containerSize ? `${line.containerType} ${line.containerSize}` : "미선택"));
      document.getElementById("screen-form").innerHTML = `
        <div class="section-head">
          <div>
            <h1>${draft.id ? "입고확인서 수정" : "입고확인서 작성"}</h1>
            <p class="muted">문자앱 열기와 송금 대상 확인을 위해 전화번호와 계좌정보를 저장합니다.</p>
          </div>
          <button class="ghost-button" type="button" onclick="showScreen('home')">홈으로</button>
        </div>
        ${renderFavoritePanel()}
        <div class="panel">
          <div class="field">
            <label for="farmerName">농가명</label>
            <input id="farmerName" list="farmerNameOptions" value="${escapeHtml(draft.farmerName)}" oninput="handleHistoryInput('farmerName', this.value)" placeholder="예: 김해숙 농가">
            <datalist id="farmerNameOptions">${uniqueHistoryOptions("farmerName").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
          </div>
          <div class="field">
            <label for="farmerPhone">전화번호</label>
            <input id="farmerPhone" list="farmerPhoneOptions" inputmode="tel" value="${escapeHtml(draft.phone)}" oninput="handleHistoryInput('phone', this.value)" placeholder="예: 010-0000-0000">
            <datalist id="farmerPhoneOptions">${uniqueHistoryOptions("phone").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
            <span class="muted">${draft.phone ? "전체 번호를 저장합니다." : phoneDisplay(draft)}</span>
          </div>
          <div class="field">
            <label for="bankName">은행명</label>
            <input id="bankName" value="${escapeHtml(draft.bankName)}" oninput="draft.bankName = this.value" placeholder="예: 농협">
          </div>
          <div class="field">
            <label for="accountNo">계좌번호</label>
            <input id="accountNo" list="accountNoOptions" inputmode="numeric" value="${escapeHtml(draft.accountNo)}" oninput="handleHistoryInput('accountNo', this.value)" placeholder="검토용 계좌번호">
            <datalist id="accountNoOptions">${uniqueHistoryOptions("accountNo").map((value) => `<option value="${escapeHtml(value)}"></option>`).join("")}</datalist>
          </div>
          <div class="field">
            <label for="accountHolder">예금주</label>
            <input id="accountHolder" value="${escapeHtml(draft.accountHolder)}" oninput="draft.accountHolder = this.value" placeholder="예: 김해숙">
          </div>
          ${draft.autoFillNotice ? `<p class="muted">${escapeHtml(draft.autoFillNotice)}</p>` : ""}
          <p class="muted">현재는 브라우저 localStorage 기반 검토용입니다. 실운영 개인정보/계좌정보 저장에는 백엔드, 로그인, 권한, 백업이 필요합니다.</p>
        </div>
        <div class="panel">
          <h2>작업 상태</h2>
          <label class="ghost-button" style="display:inline-flex; align-items:center; gap:8px;">
            <input type="checkbox" ${isWorkCompleted(draft) ? "checked" : ""} onchange="setDraftWorkCompleted(this.checked)">
            작업 완료
          </label>
          <p class="muted">${isWorkCompleted(draft)
            ? "작업 완료 상태입니다. 단가와 금액을 확정해 문자와 정산/송금 후보에 반영합니다."
            : "작업 후 정산 예정 상태입니다. 수량과 등급은 저장하지만 단가/금액은 확정하지 않고 송금 대상에서 제외합니다."}</p>
        </div>
        ${draft.id && sentLikeStatus(draft.originalStatus) ? `
          <div class="panel">
            <span class="badge pending-price">전송 완료 후 수정 중</span>
            <p class="muted">품목, 등급, 용기, 수량, 단가 관련 상세 줄이 바뀌면 이 확인서는 재전송필요 상태가 되고 일자별 현황의 반영 가능 금액에서 제외됩니다.</p>
          </div>
        ` : ""}
        <div class="panel">
          <h2>등급별 수량 입력</h2>
          <p class="muted">과일과 용기를 한 번 고른 뒤 A/B/C/소 수량이 있는 등급만 상세 줄로 반영합니다.</p>
          <h3>과일/품목</h3>
          <div class="option-grid">${ITEMS.map((item) => optionButton("item", item, line.item === item)).join("")}</div>
          <h3>용기/무게</h3>
          <div class="option-grid">${CONTAINERS.map((container) => {
            const selected = line.containerType === container.type && (container.type === "기타" || line.containerSize === container.size);
            return `<button class="option-card ${selected ? "selected" : ""}" type="button" onclick="selectContainer('${container.type}', '${container.size}', ${container.kg === null ? 0 : container.kg})"><strong>${container.label}</strong><span>20kg 기준 단가 적용</span></button>`;
          }).join("")}</div>
          ${line.containerType === "기타" ? `
            <div class="field">
              <label for="customKg">기타 kg</label>
              <input id="customKg" type="number" min="0" step="0.1" inputmode="decimal" value="${line.customKg || ""}" oninput="draft.line.customKg = Number(this.value || 0); draft.line.containerSize = draft.line.customKg > 0 ? draft.line.customKg + 'kg' : ''; renderForm();" placeholder="예: 12">
              <span class="muted">0보다 큰 kg이면 20kg 기준 단가에 비례해 계산합니다. 비어 있거나 0이면 단가미정으로 저장됩니다.</span>
            </div>
          ` : ""}
          ${renderGradeBatchInputs()}
          <div class="button-row">
            <button class="primary-button" type="button" onclick="applyGradeBatch()">등급별 줄 반영</button>
          </div>
          <details>
            <summary>직접 상세 줄 추가</summary>
            <h3>직접 추가용 등급</h3>
            <div class="option-grid">${GRADES.map((grade) => optionButton("grade", grade, line.grade === grade)).join("")}</div>
            <div class="money-box">
              <span class="muted">선택</span>
              <b>${escapeHtml(line.item || "품목")} · ${escapeHtml(line.grade || "등급")} · ${escapeHtml(selectedContainer)}</b>
              <span class="muted">${lineEstimateLabel()}</span>
            </div>
            ${renderQtyControls()}
            <div class="button-row">
              <button class="primary-button" type="button" onclick="addLine()" ${canAddLine() ? "" : "disabled"}>직접 상세 줄 추가</button>
              <button class="ghost-button" type="button" onclick="clearLine()">새 상세 입력</button>
            </div>
          </details>
        </div>
        <div class="panel">
          <h2>추가된 상세 줄</h2>
          ${renderLineList(draft.lines, true)}
          <div class="money-box">
            <span>정산 반영 합계</span>
            <b>${receiptAmountLabel(draft)}</b>
            <span class="muted">${isWorkCompleted(draft) ? `단가 미정 ${pendingCount(draft.lines)}건 제외` : "작업 완료 후 금액 확정 필요"}</span>
          </div>
          <div class="button-row">
            <button class="primary-button" type="button" onclick="goPreview()" ${canPreview() ? "" : "disabled"}>확인서 미리보기</button>
          </div>
        </div>
      `;
    }

    function optionButton(key, value, selected) {
      return `<button class="option-card ${selected ? "selected" : ""}" type="button" onclick="selectLineValue('${key}', '${value}')"><strong>${escapeHtml(value)}</strong><span>선택</span></button>`;
    }

    function selectLineValue(key, value) {
      draft.line[key] = value;
      renderForm();
    }

    function selectContainer(type, size, kg = 0) {
      draft.line.containerType = type;
      draft.line.containerSize = type === "기타" ? "" : size;
      draft.line.customKg = type === "기타" ? 0 : kg;
      renderForm();
    }

    function setDraftWorkCompleted(checked) {
      if (isPaymentLocked(draft)) {
        toast("송금완료 해제 후 작업 상태를 바꿀 수 있습니다.");
        renderForm();
        return;
      }
      const nextStatus = checked ? "작업완료" : "작업후정산예정";
      draft.workStatus = nextStatus;
      draft.lines = draft.lines.map((line) => recalcLineForWorkStatus(line, nextStatus));
      if (sentLikeStatus(draft.originalSmsStatus || draft.originalStatus) && draft.originalWorkStatus === "작업후정산예정" && nextStatus === "작업완료") {
        draft.wasWorkPendingBeforeRevision = true;
      }
      renderForm();
      toast(checked ? "작업 완료로 바꿨습니다. 문자 재전송이 필요할 수 있습니다." : "작업 후 정산 예정으로 바꿨습니다.");
    }

    function lineEstimateLabel() {
      if (isWorkPending(draft)) return "작업 후 정산 예정: 단가와 금액은 문자/정산에 표시하지 않습니다.";
      if (!draft.line.item) return "품목을 선택하면 과일별 20kg 기준 단가를 확인합니다.";
      if (!draft.line.grade) return "등급을 선택하면 과일별 20kg 기준 단가를 확인합니다.";
      const unitPrice = findPrice(draft.line.item, draft.line.grade);
      if (unitPrice === null) return `${draft.line.item} ${draft.line.grade} 등급 20kg 기준 단가 미정`;
      if (!draft.line.containerType) return `20kg 기준 단가 ${money(unitPrice)} · 용기를 선택하세요.`;
      const preview = makeLine(draft.line.item || "", draft.line.grade, draft.line.containerType, draft.line.containerSize, draft.line.count, draft.line.customKg, draft.workStatus);
      return isPricePending(preview) ? `20kg 기준 단가 ${money(unitPrice)} · kg 확인 필요` : `20kg 기준 단가 ${money(unitPrice)} · 예상 금액 ${money(preview.amount)}`;
    }

    function parseCount(value) {
      const numberValue = Number(value || 0);
      return Number.isFinite(numberValue) && numberValue > 0 ? Math.floor(numberValue) : 0;
    }

    function setGradeBatchCount(grade, value) {
      if (!draft.gradeCounts) draft.gradeCounts = emptyGradeCounts();
      draft.gradeCounts[grade] = value;
    }

    function renderGradeBatchInputs() {
      if (!draft.gradeCounts) draft.gradeCounts = emptyGradeCounts();
      return `
        <h3>등급별 수량</h3>
        <div class="filter-row">
          ${GRADES.map((grade) => `
            <div class="field">
              <label for="grade-count-${grade}">${grade} 수량</label>
              <input id="grade-count-${grade}" type="number" min="0" step="1" inputmode="numeric" value="${escapeHtml(draft.gradeCounts[grade] || "")}" oninput="setGradeBatchCount('${grade}', this.value)" placeholder="0">
            </div>
          `).join("")}
        </div>
        <p class="muted">${isWorkCompleted(draft) ? "수량이 있는 등급만 현재 과일/품목별 20kg 기준 단가로 계산합니다." : "작업 후 정산 예정 상태에서는 등급별 수량만 저장하고 단가/금액은 표시하지 않습니다."}</p>
      `;
    }

    function applyGradeBatch() {
      if (!draft.gradeCounts) draft.gradeCounts = emptyGradeCounts();
      const line = draft.line;
      if (!line.item || !line.containerType) {
        toast("과일/품목과 용기를 확인하세요.");
        return;
      }
      const nextLines = GRADES.map((grade) => {
        const count = parseCount(draft.gradeCounts[grade]);
        if (count <= 0) return null;
        return makeLine(line.item, grade, line.containerType, line.containerSize, count, line.customKg, draft.workStatus);
      }).filter(Boolean);
      if (!nextLines.length) {
        toast("A/B/C/소 중 1개 이상 수량을 입력하세요.");
        return;
      }
      draft.lines.push(...nextLines);
      draft.gradeCounts = emptyGradeCounts();
      clearLine(false);
      renderForm();
      toast(`등급별 상세 줄 ${nextLines.length}개를 반영했습니다.`);
    }

    function renderQtyControls() {
      const count = Number(draft.line.count || 0);
      return `
        <h3>수량</h3>
        <div class="qty-control">
          ${[-10, -1, 1, 10].map((delta) => `<button class="qty-button" type="button" onclick="changeCount(${delta})">${delta > 0 ? "+" : ""}${delta}</button>`).join("")}
        </div>
        <div class="field">
          <label for="lineCount">개수 직접 입력</label>
          <input id="lineCount" type="number" min="0" value="${count}" oninput="draft.line.count = Math.max(0, Number(this.value || 0)); renderForm();">
        </div>
      `;
    }

    function changeCount(delta) {
      draft.line.count = Math.max(0, Number(draft.line.count || 0) + delta);
      renderForm();
    }

    function setCount(value) {
      draft.line.count = Math.max(0, Number(value || 0));
      renderForm();
    }

    function canAddLine() {
      const line = draft.line;
      return Boolean(line.item && line.grade && line.containerType && Number(line.count) > 0);
    }

    function addLine() {
      if (!canAddLine()) {
        toast("품목, 등급, 용기, 1개 이상 수량을 확인하세요.");
        return;
      }
      draft.lines.push(makeLine(draft.line.item, draft.line.grade, draft.line.containerType, draft.line.containerSize, draft.line.count, draft.line.customKg, draft.workStatus));
      clearLine(false);
      renderForm();
      toast("상세 줄을 추가했습니다.");
    }

    function clearLine(render = true) {
      draft.line = defaultLineInput();
      if (render) renderForm();
    }

    function removeDraftLine(lineId) {
      draft.lines = draft.lines.filter((line) => line.id !== lineId);
      renderForm();
    }

    function canPreview() {
      return draft.farmerName.trim() && digitsOnly(draft.phone).length >= 8 && draft.lines.length && draft.lines.every((line) => Number(line.count) > 0);
    }

    function goPreview() {
      if (!canPreview()) {
        toast("농가명, 전화번호, 상세 줄을 확인하세요.");
        return;
      }
      draft.receivedAt = nowLocal();
      draft.receivedDate = draft.receivedAt.slice(0, 10);
      if (draftNeedsResend()) {
        draft.smsStatus = "재전송필요";
        draft.status = "재전송필요";
        draft.isRevision = true;
        saveDraft("재전송필요");
        toast("수정 후 다시 문자를 보내야 합니다.");
      }
      showScreen("preview");
    }

    function renderLineList(lines, removable = false) {
      if (!lines.length) return "<div class='empty'>상세 줄이 없습니다.</div>";
      return `<div class="line-list">${lines.map((line, index) => `
        <div class="line-item">
          <div class="section-head" style="margin:0;">
            <h3>${index + 1}. ${escapeHtml(line.item)} ${escapeHtml(line.grade)}</h3>
            <span class="badge ${lineIsWorkPending(line) || isPricePending(line) ? "pending-price" : "done"}">${amountLabel(line)}</span>
          </div>
          <div class="muted">${escapeHtml(containerDisplay(line))} · ${number(line.count)}개 · 20kg 기준 단가 ${priceLabel(line)}</div>
          ${removable ? `<button class="danger-button" type="button" onclick="removeDraftLine('${line.id}')">이 줄 삭제</button>` : ""}
        </div>
      `).join("")}</div>`;
    }

    function buildConfirmationFromDraft() {
      const now = nowLocal();
      return {
        id: draft.id || makeId("confirm"),
        no: draft.no,
        farmerName: draft.farmerName.trim(),
        phone: draft.phone.trim(),
        phoneLast4: last4(draft.phone) || draft.phoneLast4 || "",
        bankName: draft.bankName.trim(),
        accountNo: draft.accountNo.trim(),
        accountHolder: draft.accountHolder.trim(),
        receivedAt: draft.receivedAt || now,
        receivedDate: (draft.receivedAt || now).slice(0, 10),
        smsStatus: draft.smsStatus || draft.status || "문자대기",
        paymentStatus: draft.paymentStatus || "송금대기",
        paymentCompletedAt: draft.paymentCompletedAt || "",
        paymentCompletedAtBeforeUnlock: draft.paymentCompletedAtBeforeUnlock || "",
        paymentUnlockedAt: draft.paymentUnlockedAt || "",
        paymentStatusChangedAt: draft.paymentStatusChangedAt || "",
        workStatus: normalizeWorkStatus(draft),
        isWorkCompleted: isWorkCompleted(draft),
        wasWorkPendingBeforeRevision: Boolean(draft.wasWorkPendingBeforeRevision || (sentLikeStatus(draft.originalSmsStatus || draft.originalStatus) && draft.originalWorkStatus === "작업후정산예정" && isWorkCompleted(draft))),
        status: draft.smsStatus || draft.status || "문자대기",
        lines: draft.lines.map((line) => ({ ...line, workStatus: normalizeWorkStatus(draft), workPending: isWorkPending(draft) })),
        isRevision: Boolean(draft.isRevision),
        createdAt: draft.createdAt || now,
        updatedAt: now
      };
    }

    function saveDraft(status = "문자대기") {
      const isRevisionAdvance =
        draftNeedsResend() &&
        draft.isRevision &&
        ((draft.smsStatus === "재전송필요" && status === "문자앱열림") ||
          (draft.smsStatus === "문자앱열림" && status === "전송완료"));

      if (draftNeedsResend() && status !== "재전송필요" && !isRevisionAdvance) {
        status = "재전송필요";
        draft.smsStatus = "재전송필요";
        draft.status = "재전송필요";
        draft.isRevision = true;
      }

      const confirmation = buildConfirmationFromDraft();
      confirmation.smsStatus = status;
      confirmation.status = status;
      const existing = db.confirmations.findIndex((row) => row.id === confirmation.id);
      if (existing >= 0) db.confirmations[existing] = confirmation;
      else db.confirmations.push(confirmation);
      saveDb();
      selectedConfirmationId = confirmation.id;
      draft.id = confirmation.id;
      draft.smsStatus = confirmation.smsStatus;
      draft.status = confirmation.smsStatus;
      renderAll();
      return confirmation;
    }

    function renderPreview() {
      document.getElementById("screen-preview").innerHTML = `
        <div class="section-head">
          <div>
            <h1>전자 입고확인서 미리보기</h1>
            <p class="muted">문자 발송 전 최종 확인 화면입니다.</p>
          </div>
          <button class="ghost-button" type="button" onclick="showScreen('form')">수정</button>
        </div>
        ${renderPreviewCard(draft, true)}
        <div class="panel">
          <h2>문자 보내기</h2>
          <div class="recipient-box">
            <span class="muted">수신 전화번호</span>
            <b>${escapeHtml(formatPhoneForDisplay(draft.phone))}</b>
          </div>
          <p class="muted">문자앱이 열리면 실제 전송 버튼은 사용자가 직접 눌러야 합니다. 웹앱은 발송 성공 여부를 알 수 없습니다.</p>
          <textarea id="messagePreview" readonly>${escapeHtml(buildMessage(draft))}</textarea>
          <div class="button-row">
            <a id="smsLink" class="primary-button" href="${smsHref(draft.phone, buildMessage(draft))}" onclick="markSmsOpened()">${isRevisionMessage(draft) ? "수정본 문자앱 열기" : "문자앱 열기"}</a>
            <button class="secondary-button" type="button" onclick="copyMessage()">문구 복사</button>
            ${draft.smsStatus === "재전송필요" ? `<span class="muted">수정본 문자앱을 연 뒤 완료 표시가 가능합니다.</span>` : `<button class="ghost-button" type="button" onclick="markSentDone()">문자 전송 후 완료로 표시</button>`}
          </div>
        </div>
      `;
    }

    function renderPreviewCard(source, isDraft = false) {
      const lines = source.lines || [];
      return `
        <div class="confirm-preview">
          <div class="preview-no">NO ${escapeHtml(source.no)}</div>
          <div class="preview-title">${escapeHtml(source.farmerName || "농가명 미입력")} 입고확인서</div>
          <ul class="summary-list">
            <li><span>입고일시</span><b>${escapeHtml((source.receivedAt || "").replace("T", " "))}</b></li>
            <li><span>문자상태</span><b>${escapeHtml(source.smsStatus || source.status || "문자대기")}</b></li>
            <li><span>송금상태</span><b>${escapeHtml(source.paymentStatus || "송금대기")}</b></li>
            <li><span>작업상태</span><b>${escapeHtml(workStatusLabel(source))}</b></li>
            <li><span>전화번호</span><b>${escapeHtml(phoneDisplay(source))}</b></li>
            <li><span>계좌정보</span><b>${escapeHtml(accountDisplay(source))}</b></li>
            <li><span>정산 반영 합계</span><b>${receiptAmountLabel(source)}</b></li>
            <li><span>단가 미정 건수</span><b>${receiptPendingPriceLabel(source)}</b></li>
          </ul>
          ${renderLineList(lines, false)}
        </div>
      `;
    }

    function buildMessage(source) {
      const lines = source.lines || [];
      const lineText = lines.map((line, index) => {
        const base = `${index + 1}. ${line.item} ${line.grade} ${containerDisplay(line)} ${line.count}개`;
        return isWorkPending(source) ? base : `${base} / ${amountLabel(line)}`;
      }).join("\n");
      const title = isSettlementFinalMessage(source) ? "[해바람 입고확인 정산확정]" : (isRevisionMessage(source) ? "[해바람 입고확인 수정본]" : "[해바람 입고확인]");
      const detailLabel = isRevisionMessage(source) ? "수정된 상세 줄" : "상세 줄";
      if (isWorkPending(source)) {
        return `${title}\n입고번호: ${source.no}\n농가명: ${source.farmerName}\n${detailLabel}:\n${lineText}\n작업 후 정산 예정입니다. 선별 작업 완료 후 등급·단가·금액을 확정해 다시 안내드리겠습니다.\n내용이 다르면 연락 바랍니다.`;
      }
      return `${title}\n입고번호: ${source.no}\n농가명: ${source.farmerName}\n${detailLabel}:\n${lineText}\n정산 반영 합계: ${money(totalAmount(lines))}\n단가 미정 건수: ${pendingCount(lines)}건\n내용이 다르면 연락 바랍니다.`;
    }

    function smsHref(phone, message) {
      const digits = digitsOnly(phone);
      return `sms:${digits}?body=${encodeURIComponent(message)}`;
    }

    function formatPhoneForDisplay(phone) {
      const digits = digitsOnly(phone);
      if (digits.length === 11) return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
      if (digits.length === 10) return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6)}`;
      return phone || "전화번호 미입력";
    }

    function phoneDisplay(source) {
      if (source?.phone) return formatPhoneForDisplay(source.phone);
      if (source?.phoneLast4) return `기존 데이터: 전체 번호 없음 (뒤 4자리 ${source.phoneLast4})`;
      return "전화번호 미입력";
    }

    function accountDisplay(source) {
      const parts = [source?.bankName, source?.accountNo, source?.accountHolder].filter(Boolean);
      return parts.length ? parts.join(" / ") : "계좌정보 미입력";
    }

    function markSmsOpened() {
      const confirmation = saveDraft("문자앱열림");
      toast(`${confirmation.no} 문자앱열림 상태로 저장했습니다.`);
    }

    async function copyMessage() {
      const text = document.getElementById("messagePreview")?.value || buildMessage(draft);
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      toast("확인서 문구를 복사했습니다.");
    }

    function markSentDone() {
      const confirmation = saveDraft("전송완료");
      toast(`${confirmation.no} 전송완료 상태로 저장했습니다.`);
      showScreen("settlement");
    }

    function renderToday() {
      const rows = confirmationsByDate(receiptDateFilter).sort((a, b) => b.receivedAt.localeCompare(a.receivedAt));
      document.getElementById("screen-today").innerHTML = `
        <div class="section-head">
          <div>
            <h1>입고 확인 내역</h1>
            <p class="muted">선택한 일자의 확인서, 상세 줄, 전화번호, 계좌정보, 문자/송금 상태를 확인합니다.</p>
          </div>
          <button class="primary-button" type="button" onclick="startNew()">새 확인서</button>
        </div>
        <div class="filter-row">
          <div class="field">
            <label for="receiptDateFilter">입고일자</label>
            <input id="receiptDateFilter" type="date" value="${escapeHtml(receiptDateFilter)}" onchange="receiptDateFilter = this.value || localDateISO(); renderToday();">
          </div>
        </div>
        ${rows.length ? `<div class="line-list">${rows.map(renderConfirmationCard).join("")}</div>` : "<div class='empty'>선택한 일자의 입고 확인 내역이 없습니다.</div>"}
      `;
    }

    function renderConfirmationCard(confirmation) {
      const locked = isPaymentLocked(confirmation);
      return `
        <div class="confirm-card">
          <div class="section-head" style="margin:0;">
            <div>
              <h3>${escapeHtml(confirmation.no)}</h3>
              <div class="muted">${escapeHtml(confirmation.farmerName)} · ${escapeHtml(phoneDisplay(confirmation))}</div>
            </div>
            <span class="badge ${statusForBadge(confirmation.smsStatus)}">${escapeHtml(confirmation.smsStatus)}</span>
          </div>
          <ul class="summary-list">
            <li><span>작업상태</span><b>${escapeHtml(workStatusLabel(confirmation))}</b></li>
            <li><span>정산 반영 합계</span><b>${receiptAmountLabel(confirmation)}</b></li>
            <li><span>단가 미정</span><b>${receiptPendingPriceLabel(confirmation)}</b></li>
            <li><span>입고일시</span><b>${escapeHtml(confirmation.receivedAt.replace("T", " "))}</b></li>
            <li><span>문자상태</span><b>${escapeHtml(confirmation.smsStatus)}</b></li>
            <li><span>송금상태</span><b>${escapeHtml(confirmation.paymentStatus || "송금대기")}</b></li>
            ${locked ? `<li><span>잠금</span><b>송금완료 잠금</b></li>` : ""}
            ${confirmation.paymentUnlockedAt ? `<li><span>송금완료 해제</span><b>${escapeHtml(confirmation.paymentUnlockedAt.replace("T", " "))}</b></li>` : ""}
            <li><span>계좌정보</span><b>${escapeHtml(accountDisplay(confirmation))}</b></li>
          </ul>
          ${renderLineList(confirmation.lines, false)}
          <div class="button-row">
            <button class="ghost-button" type="button" onclick="selectConfirmation('${confirmation.id}')">미리보기</button>
            ${locked ? `
              <button class="ghost-button" type="button" onclick="warnPaymentLocked('${confirmation.id}')">수정 잠김</button>
              <button class="secondary-button" type="button" onclick="unlockPayment('${confirmation.id}')">송금완료 해제</button>
            ` : `<button class="ghost-button" type="button" onclick="editConfirmation('${confirmation.id}')">수정</button>`}
            ${confirmation.smsStatus === "재전송필요" ? `<button class="primary-button" type="button" onclick="selectConfirmation('${confirmation.id}')">수정본 문자 보내기</button>` : ""}
            ${confirmation.smsStatus === "재전송필요" ? `
              <span class="muted">수정본 문자앱을 연 뒤 완료 표시가 가능합니다.</span>
            ` : `
              <button class="secondary-button" type="button" onclick="updateSmsStatus('${confirmation.id}', '전송완료')">문자 전송 후 완료로 표시</button>
              <select aria-label="문자상태 변경" onchange="updateSmsStatus('${confirmation.id}', this.value)">
                ${SMS_STATUS.map((status) => `<option value="${status}" ${status === confirmation.smsStatus ? "selected" : ""}>${status}</option>`).join("")}
              </select>
            `}
          </div>
        </div>
      `;
    }

    function selectConfirmation(id) {
      selectedConfirmationId = id;
      showScreen("send");
    }

    function updateSmsStatus(id, status) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row) return;
      row.smsStatus = status;
      row.status = status;
      row.isRevision = row.isRevision || status === "재전송필요";
      row.updatedAt = nowLocal();
      saveDb();
      renderAll();
      toast("문자상태를 변경했습니다.");
    }

    function renderSend() {
      const rows = sendWaitingRows();
      const selected = db.confirmations.find((row) => row.id === selectedConfirmationId) || rows[0];
      const resendTargetPhone = selected ? (resendPhone || selected.phone || "") : "";
      const resendDigits = digitsOnly(resendTargetPhone);
      document.getElementById("screen-send").innerHTML = `
        <div class="section-head">
          <div>
            <h1>문자 전송 대기</h1>
            <p class="muted">입고확인서를 작성하고 문자앱을 열어 전송 상태를 표시합니다.</p>
          </div>
          <button class="primary-button" type="button" onclick="startNew()">새 입고확인서 작성</button>
        </div>
        ${selected ? renderPreviewCard(selected, false) : "<div class='empty'>문자 전송 대기 확인서가 없습니다.</div>"}
        ${selected ? `
          <div class="panel">
            <h2>${selected.smsStatus === "재전송필요" ? "수정본 문자 보내기" : "저장된 문구"}</h2>
            ${selected.smsStatus === "재전송필요" ? `
              <div class="field">
                <label for="resendPhone">재전송 전화번호</label>
                <input id="resendPhone" inputmode="tel" value="${escapeHtml(resendTargetPhone)}" oninput="resendPhone = this.value; renderSend();" placeholder="전체 전화번호">
                <span class="muted">${selected.phone ? "저장된 번호를 기본으로 사용합니다. 필요한 경우 이번 문자만 수정하세요." : "기존 데이터에는 전체 번호가 없어 다시 입력해야 합니다."}</span>
              </div>
            ` : ""}
            <textarea readonly>${escapeHtml(buildMessage(selected))}</textarea>
            <div class="button-row">
              <button class="secondary-button" type="button" onclick="copyStoredMessage('${selected.id}')">문구 복사</button>
              ${selected.smsStatus === "재전송필요" ? `
                <a class="primary-button" href="${resendDigits.length >= 8 ? smsHref(resendTargetPhone, buildMessage(selected)) : "#"}" onclick="return markStoredSmsOpened('${selected.id}')">수정본 문자앱 열기</a>
                <span class="muted">수정본 문자앱을 연 뒤 완료 표시가 가능합니다.</span>
              ` : `<button class="primary-button" type="button" onclick="updateSmsStatus('${selected.id}', '전송완료')">문자 전송 후 완료로 표시</button>`}
            </div>
          </div>
        ` : ""}
        ${rows.length ? `<div class="line-list">${rows.map(renderConfirmationCard).join("")}</div>` : ""}
      `;
    }

    function markStoredSmsOpened(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      const targetPhone = resendPhone || row?.phone || "";
      if (digitsOnly(targetPhone).length < 8) {
        toast("재전송할 전체 전화번호를 입력하세요.");
        return false;
      }
      updateSmsStatus(id, "문자앱열림");
      toast("문자앱열림 상태로 변경했습니다. 문자앱에서 실제 전송 버튼을 눌러야 합니다.");
      return true;
    }

    async function copyStoredMessage(id) {
      const row = db.confirmations.find((confirmation) => confirmation.id === id);
      if (!row) return;
      try {
        await navigator.clipboard.writeText(buildMessage(row));
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = buildMessage(row);
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      toast("저장된 확인서 문구를 복사했습니다.");
    }

    function aggregateRows(rows, keyFn) {
      const map = new Map();
      rows.forEach((confirmation) => {
        (confirmation.lines || []).forEach((line) => {
          const key = keyFn(confirmation, line);
          if (!map.has(key)) map.set(key, { key, count: 0, total: 0, pending: 0, confirmations: new Set() });
          const row = map.get(key);
          row.count += Number(line.count || 0);
          row.total += payableAmount(line);
          row.pending += isPricePending(line) ? 1 : 0;
          row.confirmations.add(confirmation.no);
        });
      });
      return [...map.values()].map((row) => ({ ...row, confirmationCount: row.confirmations.size })).sort((a, b) => b.count - a.count);
    }

    function farmerAggregateRows(rows) {
      const map = new Map();
      rows.forEach((confirmation) => {
        if (!map.has(confirmation.farmerName)) {
          map.set(confirmation.farmerName, {
            key: confirmation.farmerName,
            count: 0,
            total: 0,
            pending: 0,
            confirmationCount: 0,
            phone: phoneDisplay(confirmation),
            account: accountDisplay(confirmation),
            nos: []
          });
        }
        const row = map.get(confirmation.farmerName);
        row.count += (confirmation.lines || []).reduce((sum, line) => sum + Number(line.count || 0), 0);
        row.total += totalAmount(confirmation.lines || []);
        row.pending += pendingCount(confirmation.lines || []);
        row.confirmationCount += 1;
        row.nos.push(confirmation.no);
      });
      return [...map.values()].sort((a, b) => b.total - a.total);
    }

    function dailySummary(rows) {
      const unsentRows = rows.filter((row) => ["문자대기", "문자앱열림"].includes(row.smsStatus));
      const sentRows = rows.filter((row) => row.smsStatus === "전송완료");
      const resendRows = rows.filter((row) => row.smsStatus === "재전송필요");
      const workPendingRows = rows.filter(isWorkPending);
      const pendingRows = rows.filter((row) => isWorkCompleted(row) && pendingCount(row.lines) > 0);
      const pendingLineCount = rows.reduce((sum, row) => sum + (isWorkCompleted(row) ? pendingCount(row.lines) : 0), 0);
      const workPendingLineCount = workPendingRows.reduce((sum, row) => sum + (row.lines || []).length, 0);
      const totalQuantity = rows.reduce((sum, row) => sum + (row.lines || []).reduce((lineSum, line) => lineSum + Number(line.count || 0), 0), 0);
      const payableTotal = sentRows.filter(isWorkCompleted).reduce((sum, row) => sum + totalAmount(row.lines), 0);
      return { unsentRows, sentRows, resendRows, workPendingRows, workPendingLineCount, pendingRows, pendingLineCount, totalQuantity, payableTotal };
    }

    function renderAggregateTable(title, rows, label = "구분") {
      return `
        <div class="panel">
          <h2>${title}</h2>
          ${rows.length ? `

                <tbody>
                  ${rows.map((row) => `

                </tbody>
              </table>
            </div>
          ` : "<div class='empty'>집계할 상세 줄이 없습니다.</div>"}
        </div>

    function renderBarChart(title, rows, valueLabel = "건") {
      const visibleRows = rows.filter((row) => Number(row.value || 0) > 0);

                return `

                      <span>${escapeHtml(row.label)}</span>
                      <span>${number(row.value)}${valueLabel}</span>

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko-KR"));
    }

    function paymentDateRows() {
      const from = paymentFilters.dateFrom || "";
      const to = paymentFilters.dateTo || "";
      return db.confirmations.filter((row) => {
        const date = confirmationDate(row);
        return (!from || date >= from) && (!to || date <= to);
      });
    }

    function rowMatchesPaymentFilters(row) {
      const itemOk = !paymentFilters.item || (row.lines || []).some((line) => line.item === paymentFilters.item);
      const containerOk = !paymentFilters.container || (row.lines || []).some((line) => containerDisplay(line) === paymentFilters.container);
      const farmerOk = !paymentFilters.farmer || row.farmerName === paymentFilters.farmer;
      return itemOk && containerOk && farmerOk;
    }

    function paymentBaseRows() {
      return paymentDateRows().filter(rowMatchesPaymentFilters);
    }

    function paymentTargetRows(rows = paymentBaseRows()) {
      return rows.filter(isPaymentBaseEligible);
    }

    function paymentVisibleRows() {
      return paymentTargetRows().filter((row) => {
        if (paymentFilters.status === "미송금") return row.paymentStatus !== "송금완료";
        if (paymentFilters.status === "송금완료") return row.paymentStatus === "송금완료";
        return true;
      }).sort((a, b) => a.farmerName.localeCompare(b.farmerName, "ko-KR") || b.receivedAt.localeCompare(a.receivedAt));
    }

    function paymentFilterOptions() {
      const rows = paymentDateRows();
      return {
        items: uniqueSorted(rows.flatMap((row) => (row.lines || []).map((line) => line.item))),
        containers: uniqueSorted(rows.flatMap((row) => (row.lines || []).map(containerDisplay))),
        farmers: uniqueSorted(rows.map((row) => row.farmerName))
      };
    }

    function paymentExclusions() {
      const result = {
        unsent: [],
        resend: [],
        workPending: [],
        pendingPrice: [],
        missingAccount: []
      };
      paymentBaseRows().forEach((row) => {
        if (row.smsStatus === "재전송필요") result.resend.push(row);
        else if (row.smsStatus !== "전송완료") result.unsent.push(row);
        else if (isWorkPending(row)) result.workPending.push(row);
        else if (!hasPositivePayableAmount(row)) result.pendingPrice.push(row);
        else if (!hasPaymentAccount(row)) result.missingAccount.push(row);
      });
      return result;
    }

    function paymentDashboard(rows) {
      const unpaidRows = rows.filter((row) => row.paymentStatus !== "송금완료");
      const doneRows = rows.filter((row) => row.paymentStatus === "송금완료");
      return {
        targetPeople: new Set(rows.map((row) => row.farmerName)).size,
        unpaidPeople: new Set(unpaidRows.map((row) => row.farmerName)).size,
        donePeople: new Set(doneRows.map((row) => row.farmerName)).size,
        unpaidTotal: unpaidRows.reduce((sum, row) => sum + totalAmount(row.lines), 0),
        doneTotal: doneRows.reduce((sum, row) => sum + totalAmount(row.lines), 0),
        grandTotal: rows.reduce((sum, row) => sum + totalAmount(row.lines), 0)
      };
    }

    function paymentAggregateRows(rows, keyFn) {
      const map = new Map();
      rows.forEach((confirmation) => {
        (confirmation.lines || []).forEach((line) => {
          const key = keyFn(confirmation, line);
          if (!map.has(key)) map.set(key, { key, quantity: 0, total: 0, confirmations: new Set(), farmers: new Set() });
          const row = map.get(key);
          row.quantity += Number(line.count || 0);
          row.total += payableAmount(line);
          row.confirmations.add(confirmation.no);
          row.farmers.add(confirmation.farmerName);
        });
      });
      return [...map.values()].map((row) => ({
        key: row.key,
        quantity: row.quantity,
        total: row.total,
        confirmationCount: row.confirmations.size,
        farmerCount: row.farmers.size
      })).sort((a, b) => b.total - a.total);
    }

    function renderPaymentAggregateTable(title, rows, label) {
      return `
        <div class="panel">
          <h2>${title}</h2>
          ${rows.length ? `
            <div class="table-wrap">

                <tbody>
                  ${rows.map((row) => `
                    <tr>
                      <td>${escapeHtml(row.key)}</td>
                      <td>${number(row.quantity)}</td>
                      <td>${number(row.confirmationCount)}</td>

        </div>

    }

    function renderPaymentExclusionPanel(title, rows, reason) {
      return `
        <div class="panel warning-panel">
          <h2>${title}</h2>
          <p class="muted">${reason}</p>
          ${rows.length ? `<div class="line-list">${rows.map((row) => `
